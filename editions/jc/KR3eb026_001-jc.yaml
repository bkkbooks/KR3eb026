body:
  text: 卷上六朝高陽生剽竊晉太醫令王叔和撮其切要撰為脈訣蔡西山辨之詳矣世相因人相授咸曰王叔和脈訣既不能正其名又不能辨其非訛承惑固是以罔覺今刊其誤題曰脈訣不以王叔和加其首者先正其名也竊取靈素內經秦越人張仲景華佗王叔和及歷代名醫之書以證又述諸家所解集長辨短知我者其惟脈訣乎罪我者其惟脈訣乎診候入式歌左心小腸肝膽腎右肺大腸脾胃命腎十二經動脈循環無端始於手太陰終於足厥陰一晝夜五十周朝於寸口會於平旦內經診以平旦難經獨取寸口寸口者即手太陰之經渠穴也上古診法有三其一各於十二經動脈見處分為三部天地人以候各臟腑其二以寸口與人迎參之以驗陰陽四時之大小以決其病其三獨取寸口以內外分臟腑以高下定身形斯王叔和之所取以為寸口臟腑之位脈訣述之有差脈經兩尺並屬腎與膀胱今脈訣以命門列右尺通真子注又以三焦為命門合並屬右尺是不可以不辯十八難曰手心主少陽火生足太陰陽明土土主中宮故在中部也亦未嘗言手心主少陽火在何部也二十五難曰心主與三焦為表裡靈樞銅人並同又未嘗以三焦合命門也且持脈有道因動脈而有別假使以右腎為命門之臟外無經絡其動脈何在且命門之說始於扁鵲亦不分男女左右考之內經腎固已分為兩臟未嘗有命門也惟銅人有命門穴在十四椎下靈樞言兩目為命門既無動脈何以為診又非正臟何以列部腎有兩枚均為腎尺內以候腎同列左右尺斯黃岐之正論習醫者不本內經而信末世昧理之謬論安能悟其非而造其妙三因方以右腎居右尺中屬手厥陰經與三焦手少陽經合則又差之甚矣心主非右腎也手厥陰雖與三焦經合其起於心中出屬心包絡終於手小指次指其經不行尺部之下也何以列在右尺黎氏曰扁鵲以心主與三焦為表裡而脈訣以命門與三焦為表裡者以腎為精之舍三焦為精之府也命門雖系一臟外別無經與腎俱屬足少陰經與足太陽膀胱相為表裡以此推之三焦之氣與命門通而三焦之經不與命門合也扁鵲之論為正然則寸口之部位以何為正也脈要精微論曰尺內兩旁則季脅也尺內以候腎尺外以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也此寸口部之定位也或曰必以動脈為診則手厥陰少陽二經當列何部也曰經雲手少陰獨無腧乎其外經病而臟不病也故治病者治包絡之經無犯其經則手厥陰同手少陰經部診也手少陽為三焦則各分於上中下部以診也則十二經動脈皆可診於寸口矣潔古以地道自右逆行言脈三部自手少陰君火心始逆而至厥陰風木肝逆而至太陽寒水外應十一月內應於左尺腎與膀胱接右手肺應九月居右寸逆至太陰土為脾應右關又逆至手厥陰與三焦以愚考之此乃地六氣之步位故歲首於春初之氣亦始厥陰風木君火不任令退居二氣而少陽相火當夏為三之氣四氣太陰五氣陽明六氣太陽乃取地之六氣依四時而至難以言寸口三部之位且六節氣位乃地理之應也經曰顯明之右君火之位君火之右退行一步相火治之復行一步土氣治之雖始以君火亦順次而行未嘗逆楊仁齋以右尺其經手厥陰其藏心包絡其府三焦其名命脈決非右腎之命門以愚考之十二經脈自上古立名今不悟脈歌非王叔和之本經又立命脈以附和之且觀於內經尺內以候腎原不曾分左右是合左右之尺皆以候腎亦無所謂命脈矣仁齋直指於醫方發明甚高惜乎於此未明女人反此背看之男女脈形有異同尺脈位第三同斷腎病歌首二句只言部位未論脈女人反此背看云者原其惑於男左腎右命門女右腎左命門故言反此又斷之曰尺脈第三同斷病則反此背看者只論尺脈耳男女有異同者脈形爾如男脈關上盛女脈關下盛男左大右小為順女右大左小為順男女脈位即無異同也以十二經脈所行之終始五歲之定位成形則一也惟莖戶及胞門子戶精血之不同爾安可言脈位女人與男子反而背看乎脈訣之誤因於腎與命門有男女之別不知腎有兩其左為腎右為命門難經雖有左右之別亦無男女左右之分其實皆腎臟非命門也至褚氏遺書則又以女人心肺自尺始倒裝五臟則謬又甚焉或曰南政北政三陰司天在泉而尺寸亦或易位褚氏之論或原此乎曰不然也司天在泉以天之六步為客脈也故隨南北政以分尺寸之不應耳其地之六步為主脈即隨候以見而不移也心肺在上肝腎在下脾脈在中自三才分而為人亙古今何嘗異無求子曰所謂反者男子尺脈常弱今反盛女子尺脈常盛今反弱故謂之反耳李晞範因之雖於反字義明不同於眾論然反盛反弱乃男女之病脈今入式歌方言部位而遽以病脈牽解似非本旨特作歌者不善行文故以反此背看傳惑於世耳今刊而改之如上心與小腸居左寸肝膽同居左關定腎居尺脈亦如然用意調和審安靜肺與大腸居右寸脾胃脈從關裡認命門還與腎脈同用心仔細須尋趁此脈訣重分左右寸關尺部所出也其曰命門還與腎脈同以此句觀之命門即腎也既知其非動脈前何必以命門為臟而列部邪察病指南以右手尺為命門卻又曰一名手心主包絡則又差以命門為心主也心為臟小腸為腑以腑配臟者實以手少陰心經與手太陽小腸經二經脈相接故同一部其餘臟腑同部皆同然臟腑之脈實以浮沉之位別之腑陽也故因浮而見藏陰也故因沉而見然以難經一脈十變推之如雲心急甚者肝邪干心心微急者膽邪干小腸是又以本臟之脈微甚別臟腑也察病指南以七難六氣循甲子旺脈分六腑者非也陽明脈浮大而短安得為胃脈形也浮大而短陽明燥金脈也若診他脈覆手看要自看時仰手認診脈皆須仰手看覆手反診用不應古人診病必仰病人手而診醫者覆其手以三部九候菽重之法取之惟反其診者不然蓋南北二政之歲三陰司天在泉尺寸或有不應者反其診則應矣不應者脈沉不應診也覆病人手診之則脈見也沉者為浮細者為大舍此之外無覆手之診升按脈訣之言謂診他則覆手自診則仰手取手便而已刊誤蓋誤認歌意以醫之覆手診人為覆病人之手也自此以後有似此者節去之而不辯三部須教指下明難經曰脈有尺寸何謂也然尺寸者脈之大要會也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也故分寸為尺分尺為寸故陰得尺中一寸陽得寸內九分尺寸終始一寸九分故曰尺寸也蔡氏曰手太陰之脈自腕中橫紋至魚際橫紋得同身之一尺一寸自腕中橫紋前盡一尺為陰之位自魚際後一寸為陽之位太陰動脈前不及魚際橫紋一分後不及腕中橫紋九寸故古人於寸內取九分尺內取一寸冥契陽九陰十自然之數尺寸之間謂之關關者陰陽之限也索氏曰諸家論脈部位或曰尺寸或曰寸關尺或曰三寸為三部或尺寸三部通論其不同者何也素問言脈之部位止言尺寸未言關也至扁鵲難經乃言有關部在尺寸之交蓋扁鵲假設關位而寓於尺寸之交以為三部也其實只有尺寸而已逮仲景本論及王叔和言脈之部位或以尺寸通論某臟某腑受病者是確言諸臟腑之脈只一之意也乃合黃帝之說矣或以三部分論某臟某腑受病者是假言諸臟腑之脈各出之意也乃合扁鵲之說矣今究仲景叔和既宗黃帝言只有尺寸又從扁鵲三部之說何哉蓋黃帝言尺寸者約度之義扁鵲言三部者亦約度之義仲景叔和所以兼取並用非疑而兩存之也千金載黃帝問曰何謂三部脈也岐伯曰寸關尺也今考黃帝書無此說蓋思邈假託耳通真子曰素問三部九候論所述三部言身之上中下部非謂寸關尺也九候瞭然心裡印素問曰人有三部部有九候乃各於動脈現處候之分九候今脈訣所歌以寸關尺三部每三部內有浮中沉三候浮以候腑中以候胃氣沉以候臟通一手三部為九候也大腸共供肺為傳送素問曰大腸者傳導之官變化出焉肺者相傳之官治節出焉傳送者大腸之職非與肺共也大腸以肺為臟供送應副而已心與小腸為受盛小腸受盛與心應素問曰小腸者受盛之官化物出焉小腸配心臟與之相應非心與小腸同受盛也脾胃相通五穀消素問曰脾與胃以膜相連爾胃受五穀脾氣磨而消之膀胱腎合為津慶通津徑腎之所攝者精胞之所藏者溺精溺之泄同為一徑竇而出若曰津慶膀胱雖為津液之府然五臟六腑皆有津液非腎膀胱所專主也三焦無狀為府空有名寄分在胸中腹膈相應此段皆以臟腑配合為歌至三焦卻不以命門為配其以三焦附於尺診歟且心主與三焦為表裡心主脈歷絡三焦手少陽脈遍屬三焦其治各有所上焦如霧中焦如漚下焦如瀆各有法象不偏在下安可診於尺也且難經曰上部法天主胸以上至頭之有疾即上焦之部中下部即中下焦分診甚明矣三因方之好異也云三焦有形如脂膜附於兩腎夾脊若果如此則內經難經言之矣其經脈又何遍屬歷絡之云乎肝膽同為津液府居能上通眼目為清淨素問曰膀胱者州都之官津液藏焉則津液府施於膀胱為當以為肝膽則非又肝臟膽腑今云同為府辭又害意今改之同為津液居乃言肝膽之津液耳五臟各有液肝之液泣其候目五腑皆有出入惟膽無出入其膽之精氣則因肝之餘氣溢入於膽故藏在肝短葉間相併而居內藏精汁三合其汁清淨經曰膽者清淨之府肝藏血開竅於目目受血而能視故上通眼人年老目昏者血衰肝葉薄膽汁減也智者能調五臟和自然察認諸家病素問曰常以不病調病人醫不病故為病人平息以調之為法陳氏曰凡欲診脈先調自氣息壓取病人息以候其遲數過與不及所謂以我醫彼莫之敢違掌後高骨號為關骨下關脈形宛然以次推排名分尺澤寸三部還須仔細看尺澤者手太陰之合穴在肘中約紋上其取一寸九分之法上始魚際太淵下終尺澤一尺一寸於尺取一寸於寸取九分為三部之位通真子云三部寸口在上關脈在中尺澤在下尺澤者尺脈一寸之外餘脈所不出不見如入深澤而穴故曰尺澤安可以穴名而言尺部今改之無求子於三部每部以浮中沉及四旁分為七候先浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指內消息之此無求子合經中諸法以為定法也凡診平人之脈常以平旦凡診病脈則不以晝夜王貺子亨法也關前為陽名寸口關後為陰直下取陽弦頭痛定無疑陰弦腹痛何方走陽數即吐為熱兼頭痛吐血難經曰數則為熱脈經曰陽數則吐血陰微即瀉臍中吼陽實應知面熱風陰微盜汗勞兼有陽實大滑應舌強陰數脾熱並口臭臍下熱痛久脈經云尺脈數惡寒臍下熱痛尺主下部今云脾熱口臭脾在中州非尺所繫陽微浮弱定心寒陰滑食注脾家咎經脈不調候脈經曰尺脈滑血氣實婦人經脈不利及尿血食注脾咎當診於關上關前關後辨陰陽察病根源應不朽此總結關前為陽名寸口以下之文也脈經辨陰陽大法云關前為陽關後為陰陽數吐血陰微下利陽弦頭痛陰弦腹痛陽微自汗陰微自下陽熱口生瘡陰數加微必惡寒而煩躁不得眠陽微不能呼陰微不能吸今脈訣所述或遵或違何也潔古曰陽弦為脈浮而弦陰弦為脈沉而弦但言陰陽者乃脈之浮沉也經曰浮為表沉為里非止寸口獨浮尺獨沉尺寸俱有浮沉今按潔古論浮沉表裡則是而以論此段陰陽則非蓋脈經脈訣皆以關前陽關後陰啟之中論脈證後又以關前關後辨陰陽結之安可以浮沉論一息四至號平和更加一至大無痾素問曰人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息命曰平人難經曰脈來一呼再至不大不小曰平二經之言不同何也蓋難經因論損至之脈而概舉也故於至脈則云一呼再至曰平不言一吸者舉一使反三隅也及後再舉則兼呼吸總論不大不小者息數調勻也然不若內經理備言詳其曰閏以太息者閏在氣盈朔虛之間太息在呼吸之間猶歲之閏非一呼一吸之外再有呼吸也太息者呼吸定息在呼吸之間脈因而又一動以成五動之數亦如呼出心與肺吸入腎與肝而脾受穀氣於中在呼出吸入之間也三遲二敗冷危困六數七極熱生多八脫九死十歸墓十一十二絕魂瘥三至為遲一二敗一息一至著床害兩息一至死非怪遲敗前已言矣今重出況下文兩息一至正論損損有四等故改之以舉其凡例十四難曰何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕損脈從下上自一呼一至而至四呼一至也然離經奪精則必死矣何待三呼四呼一至故脈訣兩息一至即言死仲景曰脈有四損三日死平人四息病人脈一至也五損一日死平人五息病人脈一至也六損一時死平人六息病人脈一至也此仲景於四損之上又增五損六損為一日一時死期遲冷數熱古今同難經越度分明載難經曰數則為熱遲則為寒越度者秦越人之法度也熱即積生風冷生動氣用心指下丁寧記熱豈能生風熱積之多則風生冷不能生氣冷積之多則動氣然冷熱亦能動血而為病不可專泥也春弦夏洪鉤秋似毛冬石依經分節氣素問曰春脈如弦其氣來耎弱輕虛以滑端直以長故曰弦夏脈如鉤其氣來盛去衰故曰鉤秋脈如浮其氣來輕虛以浮來急去散冬脈如營其氣來沉以摶故曰營難經曰者弦脈來厭厭聶聶如循榆葉當依素問作脈來耎弱招招如揭長竿末梢曰平益實而滑如循長竿曰病急而勁益強如新弓弦曰死夏鉤脈來累累如環如循琅玕曰平來益數如雞舉足曰病前曲後倨如操帶鉤曰死秋毛脈來藹藹如車蓋按之益大當依素問作厭厭聶聶如落榆葉曰平不上不下如循雞羽曰病按之消索如風吹毛曰死冬石脈來上大下銳如雀之啄曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死今按四時之脈皆取法象本乎難經夏脈不當改作洪阿阿緩若春楊柳此是脾家居四季四時之末土旺十八日此脾土之本位然而四時之候四臟之脈皆以脾土胃氣為本難經曰脾者中州其平和不可得見衰乃見爾來如雀之啄如水之漏下是脾家之衰見也脈經曰六月季夏建未坤之間土之位脾旺之時其脈來阿阿而緩名曰平脈今脈訣增春楊柳以為法象蔡氏曰凡脈不大不細不長不短不浮不沉不滑不澀應手中和意思欣欣難以名狀者為胃氣亦可謂善於形容者矣今按難經所言四時之平脈者有胃氣之脈也病脈者四時脈多而胃氣少者也死脈者但有四時脈而無胃氣者也如此則胃氣之脈隨四時而寓於當時之脈之中為平脈也不可得而見亦不可得而形容其曰阿阿而緩者專以四季十八日中所診而見者言之耳在意專心察細微靈樞曉解通玄記浮芤滑實弦緊洪七表陽脈還應是本宗微沉緩澀遲並伏濡弱相兼八里陰脈同脈不可以表裡定名也惟浮沉二脈可以表裡論黃岐越人仲景叔和皆不言表裡脈經王氏所作無七表八里九道之名今脈訣竊托叔和之名其論脈卻悖於脈經自六朝以來以七表八里九道為世大惑未有言其非者王裳著闡微論謂脈訣論表不及里於脈之形狀大有發明至於表裡則不言其非尚拘拘增數長二脈為九表加短細二脈為十里以九與十為陰陽數之極嗚呼脈之變化固從陰陽生然安可以名數拘之哉從來之論脈有以浮沉長短滑澀為三陰三陽者有以大小滑澀浮沉可以指別者有以大浮數動滑為陽沉澀弱弦微為陰者有以按尺寸觀浮沉滑澀而知病所生以治者是皆以陰陽對舉而互見也未嘗云七表八里九道也但七表八里九道果可以盡脈之數乎內經曰鼓曰搏曰喘曰橫曰急曰躁仲景曰偞卑榮章綱損曰縱橫逆順豈七表八里九道之能盡也然其名雖異實不出乎陰陽故脈當以陰陽察形不當以表裡定名內經曰脈合陰陽又曰善診者察色按脈先別陰陽諸脈因浮而見者皆雲表不拘於七表諸脈因沉而見者皆曰里不拘於八里沉而滑亦曰里浮而澀亦曰表詳辨在眾脈條下血營氣衛定息數一萬三千五百通素問曰營者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間謂脈外熏於肓膜散於胸腹靈樞曰人受氣於谷谷入於胃以傳與肺五臟六腑皆以受氣其清者為營濁者為衛營行脈中衛行脈外營周不休五十而大會又曰穀氣津液已行營衛大通乃化糟粕以次傳下又曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入又曰其浮氣之不循經者為衛氣其精氣之行於經者為營氣又曰五穀入於胃也其糟粕津液宗氣分為三隊故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化以為血以營四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也營氣衛氣皆津液之所行又曰營衛者精氣也血者神氣也故血之與氣異名而同類焉又曰營出中焦衛出上焦又曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣中焦受氣取汁變化而赤是謂血又曰經脈者所以行血氣而營陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司開闔者也靈樞曰人經脈周身十六丈二尺漏水下百刻分晝夜人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺二百七十息氣行十六丈二尺一周於身下水二刻二千七百息氣行十周於身下水二十刻一萬三千五百息則氣五十周水下百刻故五十營者備得天地之壽矣凡行八百一十丈也又曰衛氣之行一日一夜五十周於身晝行於陽二十五周夜行於陰二十五周周於五臟是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目銳眥下手太陽下至手小指之間外側其散者別於目銳眥下足少陽注小指次指之間以上循手少陽之分側下至手小指之間別者以上至耳前合於頷脈注足陽明以下行至足跗上入五指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周是故日行一舍人氣行身一周與十分身之八其始入於陰常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為周是故夜行一舍人氣行於陰臟一周與十分藏之八亦如陽行之二十五周而復會於目詳見靈樞衛氣行七十六此五十周衛氣之行也晝行陽二十五度夜行陰二十五度五十周而後大會於平旦者營衛息數同也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰此經脈行度終始也與衛氣之行則各異三因方云血為脈氣為息一呼一吸一定息脈行六寸二百七十息行盡十六丈二尺者血之脈也氣之息遲於脈八息三分三釐三毫方行一寸一萬三千五百息方行盡十六丈二尺今按經雲氣積於胃以通營衛各行其道宗氣流於海下者注氣街上者走息道如此則營衛各道如上文靈樞所言營者水穀之精氣出於中焦變化為赤入於脈與息數呼吸應衛者水穀之悍氣出於上焦行於脈外溫分肉充皮膚司開闔不與脈同行不與營同道不與息數同應營衛也其異如此然而行於身也晝夜五十周則營與衛一也三因以血為脈指營言以氣為息指衛言而謂營血之脈晝夜五十周衛氣之息晝夜一周不知何據而與古經如此其異也又按難經曰營氣之行常與衛氣相隨上下衛由息而動巢元方謂氣行則血行氣住則血住皆疑其傳誤王冰謂刺絡通營衛不當兼言衛在絡之間也靈樞衛氣行篇云衛氣之行晝行陽則目張而寤夜行陰則目瞑而寐謹按此節言平旦陽氣之出目而下行於手足三陽也皆一時分道並注非有先後次第也此經篇末言水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分者則是先下太陽究竟然後下少陽俟少陽究竟然後下陽明俟陽明究竟方上行陰分大與此節矛盾並衍文也又按此節言陽氣流行之周數及下文言漏水所下之刻數合而推之其為衍文明矣何以言之夫晝日漏下之水凡五十刻晝日陽氣之行凡二十五周以晝日漏水之刻數配於晝日陽氣之周數則陽氣一周配漏水二刻也又以漏水之二刻配於陽氣之一周則陽氣之從平旦出目而分道並注下於手足三陽也蓋配水下一刻焉其從足心之出內踝上行陰分而復合於目亦配水下一刻是為一周也如此則水下一刻人氣當在三陽水下二刻人氣當在陰分而行一周於身也水下三刻人氣又當在三陽水下四刻人氣又當在陰分而行一周於身也如此周流三陽與陰分至水下五十刻則得二十五周於身而與篇首晝日行陽之數相合今此篇末水下一刻人氣在太陽二刻在少陽三刻在陽明四刻在陰分之說則是漏水下四刻配人氣行一周於身水下八刻配人氣行二周於身水下五十刻配人氣行一十二周半於身與篇首晝日行於陽二十五周之說不合豈經之本旨耶營氣之行自手太陰始至足厥陰終為一周於身也詳其一周於身外至身體四肢內至五臟六腑無不周遍故其五十周無陰陽晝夜之殊衛氣之行則不然晝但周陽於身體四肢之外不入五臟六腑之內夜但周陰於五臟六腑之內不出身體四肢之外故必五十周至平旦方與營大會於肺手太陰也五臟歌心肝脾肺腎心臟歌一心藏身之精君小腸為弟兄受盛心者君主之官一身之主宰也經曰主明則下安曰身之精不見心為尊矣精有兩義有與生俱來之精經曰兩神相搏合而成形常先身生是謂精非心之專主也有五臟六腑之精經曰腎受而藏之腎為精之處非心之所主也心臟小腸腑大言陰與陽小言夫與婦不可以兄弟言小腸為受盛之官盛平聲象離隨夏旺屬火向南生明任物無纖巨多謀最有靈內行於血海衝脈為十二經之海靈樞曰血海者衝脈也又手太陽少陰二經為表裡心主血上為乳汁下為月水經曰二陽之病發心脾女子不月心歌云內行血海以此李晞範以肝為血海而牽合之非也外應舌將榮七孔多聰慧三毛上智英反時憂不解順候脈洪驚平洪脈見於夏為順候平脈何驚之有液汗通皮潤聲言爽氣清伏梁秋得積如臂在臍縈心之積名伏梁出難經若內經腹中論所載伏梁乃風根也非心積也順視雞冠色凶看瘀血凝診時須審委細察要叮嚀實夢憂驚怪虛翻煙火明靈樞曰正邪從外襲內而未有定舍與營衛俱行而與魂魄飛揚使人臥不安而喜夢雲云秤之十二兩小大與常平心臟歌二三部俱數心家熱舌上生瘡唇破裂狂言滿目見鬼神飲水百杯終不歇心臟歌三心脈芤陽氣作聲時失血榮或時血痢尿血吐交橫溢關骨痛心煩躁更兼頭面赤騂騂池氏曰溢關者陰氣上至於關而未溢於關前陽部腎之陰水欲勝心火火不受邪水火交爭而兩傷腎傷則骨痛心傷則煩躁以致氣上攻而頭面赤大實由來面赤風燥痛面色與心同微寒虛惕心寒熱急則腸中痛不通實大相兼併有滑舌強心驚語話難單滑心熱別無病澀無心力不多言沉緊心中逆冷痛弦時心急又心懸肝臟歌一肝臟應春陽連枝膽共房色青形象木位列在東方含血榮於目牽筋運爪將逆時生恚怒順候脈弦長泣下為之液聲呼是本鄉味酸宜所納麻谷應隨糧實夢山林樹虛看細草芒積曰肥氣得杯覆脅隅旁翠羽身將吉顏同枯草殃四斤餘四兩七葉兩分行肝臟歌二三部俱弦肝有餘目中疼痛苦痃虛怒氣滿胸常欲叫翳矇瞳子淚如珠肝臟歌三肝軟並弦本沒邪緊因筋急有些些細看浮大更兼實赤痛昏昏似物遮溢關過寸口相應目眩頭重與筋疼芤時眼暗或吐血四肢癱瘓不能行澀則緣虛血散之肋脹脅滿自應知滑因肝熱連頭目緊實弦沉痃癖基微弱浮散氣作難目暗生花不耐看甚浮筋弱身無力遇此還須四體癱脾臟歌一脾臟象中坤安和對胃門旺時隨四季自與土為根磨谷能消食榮身性本溫應唇通口氣連肉潤肌臀形扁廣才長三五寸五難經曰脾廣三寸長五寸脈訣止言扁三寸失長五寸之文今合廣長著三五之數膏凝散半斤順時脈緩慢失則氣連吞素問曰五氣所病脾為吞又曰剌中脾十日死其動如吞李晞範曰連吞者所以形容緊數之脈狀乖於內經失脈訣意實夢歌歡樂虛爭飲食分濕多成五泄腸走響若雷奔痞氣冬為積皮黃四體昏二斤十四兩三斗五升存脾臟歌二三部俱緩脾家熱口臭胃翻長嘔逆齒腫斷宣注氣纏寒熱時時少心力脾臟歌三脾脈實兼浮消中脾胃虧口乾饒飲水多食亦肌虛肌一作飢單滑脾家熱口臭氣多粗澀則非多食食不作肌膚微浮傷客熱來往作微疏有緊脾家痛仍兼筋急拘欲吐不得吐沖沖未得蘇若弦肝氣盛妨食被機謀大實心中痛如邪勿帶符溢關涎出口風中見羈孤肺臟歌一肺臟最居先大腸通道宣兌為八卦地說金屬次五行牽傳皮與毛通應魂將魄共連鼻聞香臭辨壅塞氣相煎語過多成嗽瘡浮酒灌穿豬膏凝者吉枯骨命難存本積息賁患乘春右脅邊順時浮澀短反即大洪弦實夢兵戈競虛行涉夢水野田靈樞曰厥氣客於大腸則夢田野今按脈訣以水田為肺虛之夢非也大腸虛為厥氣所客則夢田野腑虛致臟虛或可連稱若曰水田則腎夢也三斤三兩重六葉散分懸肺臟歌二三部俱浮肺藏風鼻中多水唾稠濃壯熱惡寒皮膚痛顙干雙目淚痠疼肺臟歌三肺脈浮兼實咽門燥又傷大便難且澀鼻內乏馨香實大相兼滑毛焦涕唾黏更知咽有燥火盛夏宜砭沉緊相兼滑仍聞咳嗽聲微浮兼有散肺脈本家形溢出胸中滿氣泄大腸鳴弦冷腸中結芤暴痛無成為失血榮暴痛無成是不痛也潔古解得之解作痛者又非改為失血為當沉細仍兼滑應知是骨蒸皮毛皆總澀寒熱兩相承腎臟歌一腎臟對分之膀胱共合宜旺冬身行屬水位北定無欺兩耳通為竅三焦附在斯二陰竅附斯三焦非腎所附說見前篇腎開竅於二陰與兩耳皆為腎竅味鹹歸藿豆精志自相隨沉滑當時本脈浮攤緩厄在脾色同烏羽吉形似炭煤危冷積多成唾焦煩水易虧奔豚臍下積究竟骨將痿實夢腰難脊解曰難解是不解也虛行溺水湄一斤餘一兩脅下腰脊對相垂依難經曰腎形如豇豆相併而曲附於脊膂外與臍相對脅下肝之部位非腎位亦不垂腎臟歌二三部俱遲腎藏寒皮膚燥澀發毛干忽夢鬼神時入水覺來情思即無歡腎臟歌三腎散腰間氣尿多更滑精別本作澀滑並者非軟為膝脛痛陰汗豈無憑別本作其中有聚散聚散且無憑者非實滑小便澀淋痛澀騂騂脈澀精頻漏恍惚夢魂多小腸疝氣逐夢裡涉江河實大膀胱熱小便澀難通滑弦腰腳痛沉緊病還同單平勻無病憊浮緊耳應聾左右手分診五臟四時脈歌左右須候四時脈四十五動為一息日三氣畢難經曰脈不滿五十動一止一臟無氣脈訣生死歌云五十不止身無病數內有止皆知病正本難經今此乃曰四十五動為一息及六部脈歌皆以四十五動為準乖於內經謬於名數今於後六歌皆當改作五十動為是且一息者一呼一吸也四十五動非止一息也若以息為止息則脈經所謂五十動不止者五臟六腑皆受氣即無病五十動一止五歲死五動一止五日死四十五動除去五動而不及五十不知何意今詳此句想因四時脈而言或本於內經冬至夏至各四十五日為陰陽上下之期一時六氣九十日三氣得四十五日今改為四十五日以合內經李晞範脈髓作四十五動圖說亦巧而未敢信通真子潔古諸解穿鑿皆非蓋脈之流行如環無端無一息之停未嘗以五十動一止為限但止即為病依數而止期以歲死不依數而止則為結促代三病脈矣指下弦浮急洪緊數時便是有風兼熱極忽然匿匿慢沉細冷疾纏身無他事兼患氣賊脈頻來問五行屋漏雀啄終不治左手寸口心脈歌左手頭指火木之子四十五動五十動脈無他事左手者病人之手頭指者醫者按脈初下第一部之指下准此心火為木之子三十一動忽然沉頓飯忽來還復此春中候得夏須憂夏若得之秋絕體秋脈如斯又准前冬若候之春必死脈沉頓飯之久然後來乃絕止之脈見於三十一動之間三十動一止應在三年死今云在三月一時之後是以月為年也此下六歌之非皆然當以在後生死候歌為正左手關部肝脈歌左手中指木相連脈候還須來一息足五十二十六動沉卻來肝臟有風兼熱極克在二年為死日曰沉卻來即是止脈不可為風熱之診此歌蓋傳誤大抵止脈皆不吉之兆諸家穿鑿以求符合皆非今直據診生死候歌斷之二十動一止二歲死下仿此不再論三十九動澀匿匿木臟及筋終絕塞一十九動便沉沉肝絕未曾人救得左手尺部腎脈歌左手腎脈指第三四十五動五十動足無疾咎指下急急動弦數時便是熱風之脈候忽然來往慢慢極腎臟敗時須且救此病多從冷變來療之開破千金口二十五動沉卻來腎絕醫人無好手努力黃泉在眼前縱在也應終不久右手寸口肺脈歌右手頭指肺相連四十五動五十動足無憂慮極急明知是中風更看二十餘七度忽然指下來往慢肺冷莫言無大故一朝肺絕脈沉沉染病臥床思此語十二動而又不來咳嗽唾濃兼難補髮直如麻只片時毛折皮枯喘不休扁鵲也應難救護髮直如麻小腸絕也改作毛折皮枯以合難經手太陰脈絕之證仲景云若汗發潤喘不休者肺先絕右手關上脾脈歌右手第二指連脾四十五動五十動足無諸疑急動名為脾熱極食不能消定若斯欲知病患多為冷指下尋之慢極遲吐逆不定經旬日胃氣衝心得幾時右手尺部命門腎脈歌右手命腎脈三指下五十動足不須怕一十九動默然沉有死無生命絕也指下急急動如弦腎臟有風猶且治七動沉沉更不來努力今朝應是死七表一浮者陽也指下尋按之不足舉之有餘再再尋之如太過脈在肉上行曰浮主咳嗽氣促冷汗自出背膊勞倦夜臥不安脈訣曰如太過曰浮既曰舉之有餘矣如何而太過曰太過則浮洪浮緊浮弦之脈如何診之脈經並無如太過之文又尋與按不同按者重手於肌肉筋骨部也尋則或上或下或左或右隨脈部以尋之浮脈按之不足非尋之不足也按之不足舉之餘再再尋之指下浮臟中積冷榮中熱欲得生精用補虛寸浮中風頭熱痛關浮腹脹胃虛空尺部見之風入肺大腸乾澀故難通二芤者陽也指下尋之兩頭即有中間全無舉之浮大而軟按之兩邊實中間虛曰芤主淋瀝氣入小腸主失血芤草名其葉類蔥中心虛空故以指按芤草葉喻失血之脈芤之名不見於內經又曰安臥脈盛謂之脫血至仲景傷寒論曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革亦未嘗以芤為定名但附見於革至王叔和始立芤脈脈經曰芤脈其象兩邊似有中間全無今脈訣乃曰兩頭則有中間全無則誤矣夫尺脈上不至關為陰絕寸口下不至關為陽絕若兩頭似有中間全無則是陰陽絕脈也安得為芤脈乎經曰營行脈中是血在脈中行脈以血為形血盛則脈盛血虛則脈虛故芤脈中空者血之脫也芤脈先舉指時浮大而軟因按而中空今脈訣首言指下尋之非也仲景曰脈浮而緊按之反芤其人本虛若浮而數按之不芤此人本不虛是皆於按上以見芤脈尋者在浮舉沉按之間耳下仿此指下尋之中且虛邪風透入小腸居患時淋瀝尿血兼疼痛大作湯丸必自除諸家論芤皆為失血之診今曰邪風入小腸而淋瀝非其證也蓋是尿血之證矣寸芤積血在胸中關內逢芤腸里癰尺部見之虛在腎小便遺瀝血凝膿三滑者陽也指下尋之三關如珠動按之即伏不進不退往來前卻流利展轉替替然與數珠相似應指圓滑又曰漉漉如欲脫曰滑主肢體困弊腳手痠痛小便赤澀脈經曰輕手得之為浮滑重手得之為沉滑其象往來流利應指圓滑若珠之隱指今脈訣曰按之即伏不進不退則是有浮滑而無沉滑也經曰一陰一陽者謂脈來沉而滑也是沉中亦有滑也故王裳言脈訣論表不及里也且脈有獨見於一部者有通三部見者今曰三關如珠動非也按之即伏不進不退則是脈不往來而定豈所謂滑乎今取脈經所載而去其浮中而有力之語蓋此語只言浮滑亦一偏之言夫血多則脈滑滑之本體也若氣血和順其動不澀不急不緩和滑之脈為不病婦人為妊子今若曰滑為陽為病熱為實則此滑字當帶數及小實言之大抵此脈訣言脈之形狀往往未當今據經改正之而脈下所主之證多與本脈不類改之則不勝改姑置之可也滑脈如珠動曰陽腰中生氣透前腸脛酸只為生寒熱大瀉三焦必得康滑脈寸居多嘔逆關滑胃寒熱不下食尺部見之臍似冰熱下焦飲水下焦聲瀝瀝月信不通尿血澀前脾臟歌云單滑脾家熱今云胃寒不下食何也脈經曰關滑胃中有熱又云中實逆滑為熱實故不欲食食即吐逆可明為熱池氏謬言肝木克脾土致寒弦為肝脈滑豈肝脈乎脈經曰尺滑下利少氣脈賦解義云男子尺滑主膀胱冷氣小腹急脹便漩利數又云尺滑主胞絡極冷月經不調直以滑脈為陰主冷不當不若脈經所謂尺滑血氣實婦人經脈不利男子尿血為得今脈訣云臍似冰則滑為陰證又曰飲水則滑為陽熱又曰瀝瀝作聲則滑為停水之證既言冷又言熱不知何謂今正之四實者陽也指下尋之不絕舉之有餘浮中沉三候皆有力曰實主伏陽在內脾虛不食肢體勞倦柳氏曰實者氣結不通欠疏快意上部實則氣壅下部實則氣脹中部實中脘不快素問曰氣來實強是謂太過病在外氣來虛微是謂不及病在內此表裡虛實之診也今脈實而曰脾虛未敢信實脈尋之舉浮沉皆有餘伏陽蒸內致脾虛食少只緣生胃壅溫和湯藥乃痊除舉有餘止言浮實故改之實脈關前胸熱甚當關切痛中焦恁尺部如繩應指來當為下痢疼腹脹小便都淋不禁忍如繩非實脈之比乃緊脈也故改之脈經曰尺實小腹痛小便不禁又云小便難少腹牢痛蓋氣來實強者太過之脈與淋瀝相應若云小便不禁則膀胱不固水泉不止為下焦劇寒之證矣脈經用當歸湯加大黃蓋因熱而用也小便不禁必傳寫之誤後云小便難者是也潔古於此一用姜附一用承氣為兩可之辭將以為寒乎以為熱乎愚按潔古藥注脈訣及難經皆他人托之潔古必非此翁之書五弦者陽也指下尋之不足舉之有餘狀若箏弦時時帶數端直以長如弦隱指曰弦主勞風乏力盜汗多出手足痠疼皮毛枯槁指下左右皆無從前中後直過挺然於指下曰弦此血氣收斂不舒之候脈訣以弦為陽傷寒論以弦為陰脈賦解義亦云弦滑雖屬七表皆主於陰活人書云若弦而洪數者為陽弦疾而沉且微細者為陰主拘急以愚觀之經曰陰中之陽肝也當為半陰半陽之脈脈訣曰指下尋之不足舉之有餘則是有浮弦而無沉弦也經曰脈沉而弦者主懸飲內痛是沉中亦有弦又曰時時帶數則是弦數二脈相兼非單絃脈也素問曰氣來耎弱輕虛以滑端直以長曰弦今不取輕虛以滑恐有弦數弦遲兼他脈之診故止以弦本狀端直以長為弦然有弦而細有弦而粗看在何部弦而耎其病輕弦而硬其病重大率弦脈急強血氣不和之所生也又有偏弦雙弦之診弦脈為陽端直以長狀若弦四肢更被氣相煎三度解溫勞風始退常須固濟下丹田弦浮數大四者皆勞也大者易治脈氣未衰可斂而正也弦者難治血氣已耗而難補雙弦則賊邪侵脾尤為難治加數則殆矣內經曰勞者溫之不可用解寸部脈緊一條弦胸中急痛狀繩牽關中有弦寒在胃下焦停水滿丹田寸弦頭痛胸中痛左關痃癖痛攣拘右關有飲寒留胃尺弦腹痛腰腳拘既歌弦脈又言脈緊非也此歌脈證未是未盡今改作脈經曰寸弦心下愊愊微頭痛心下有水氣一云胸中拘急關弦胃寒心下厥逆一云心下拘急此胃氣虛故爾尺弦小便痛小腹及腳中拘急一云臍下拘急六緊者陽也指下尋之三關通度按之有餘舉指甚數狀如洪弦來往有力左右彈人手既如轉索又如切繩曰緊主風氣伏陽上衝化為狂病內經難經未言緊也內經曰急不曰緊曰來而左右彈人手有緊脈之狀未有緊脈之名至仲景曰緊者如轉索無常又曰緊脈從何而來假令亡汗若吐以肺裡寒假令咳者坐飲冷水假令下利以胃中虛冷皆因寒而脈緊故脈急為寒諸緊為寒至王叔和脈經則又增如切繩狀故愚合三書所論以形容之左右彈人手者緊脈來之狀左右彈人手也轉索無常者索之轉動不常在一處或緊轉在左或緊轉在右此舉指而得緊脈之狀也切繩狀者繩以兩股三股糾合為徽纏又以物切之其展轉之緊得之於按指而見以指按脈猶如切繩合此三者論之方備脈經曰重手得之為沉緊輕手得之為浮緊故咳嗽之脈沉緊則死中惡之脈浮緊則死今脈訣曰狀若洪弦此誤也緊為寒為痛弦為寒為飲洪為氣為熱主疾既殊治之亦異一概言之為害甚矣且弦小於緊數大於弦洪則不然舉按盛大非與二脈同也又緊而遲為寒緊而數為熱若曰按有餘舉甚數則又類實脈若緊遲緊細又何以診又總曰三關不曰三部又昧於尺寸之名今悉改之論此緊脈者或曰在筋肉之間通度或曰按之實數是有三部之通緊而無各部之獨緊有按之緊而無浮之緊皆一偏之辭仲景曰脈至如轉索者其日死為其緊急不軟無胃氣也轉索一也有死生之分宜詳辨之緊脈三關數又弦上來風是正根元忽然強語人驚怕不遇良醫不得痊前言狀若洪弦今曰數又弦是見之不明而頻移其說以遷就也前云主風氣伏陽化為狂今去伏陽獨言風仲景及脈經皆曰諸緊為寒非可以為風狂伏陽之診難經曰重陽者狂豈緊脈為重陽乎重陽者謂陽部更有洪大滑長數等脈見耳內經曰陰不勝其陽則脈流薄疾並乃狂薄疾者極虛而急數並謂盛實亦非緊脈也緊脈關前頭裡痛到關切痛無能動隱指寥寥轉索無常入尺來繳結疼痛繞臍長手捧脈緊如轉索非隱指寥寥之狀繳結非痛之狀今改之李氏曰陽脈至陰部自然隱伏指下寥寥入來若在寸部則不寥寥以愚視之脈隨病而見不隨部而改小腹痛必寒氣固結攻擊於下焦所以脈緊安有因在尺部而脈變形乎七洪者陽也指下尋之極大舉之有餘極大在指下來大去長而滿指曰洪主頭痛四肢洪熱大腸不通燥熱糞結口乾遍身疼痛指下尋之極大舉之有餘是浮沉皆大之象有類實脈矣脈經曰極大在指下不言舉按可以見洪之本狀診者自當隨其見於浮沉以參求爾極大在指下者指下前後左右四旁脈來皆盛大滿指是言本體之形大也來大去長言其來去之形大也洪脈根元本是陽遇其季夏夏月自然昌若逢秋季月及冬季月發汗通腸始得涼仲景曰立夏得洪大脈是其本位為應時之脈今曰季夏池氏遷就以為季夏心火漸退得脾土偃之其熱病自退若然則秋冬只在九月十二月得洪脈方可發汗通腸乎今季字皆改為月字洪脈關前熱在胸當關翻胃幾千重熱來沖更向尺中還若是小便赤澀腳痠疼八里一微者陰也指下尋之極微再再尋之若有若無欲絕非絕又曰按之如欲盡曰微主敗血不止面色無光若有若無欲絕非絕所以形容微之不可見按之如欲盡謂必輕手診則可見重手按則欲盡而無也微與濡弱相類極軟而浮細曰濡極軟而沉細曰弱極細而軟無浮沉之別者微脈也微與澀細何以分細而又短於微來往蹇滯曰澀細而稍大常有曰細細而稍長似有似無曰微合五脈相類者詳分之則微脈可知矣陽微惡寒陰弱發熱微浮雖甚不成病不可勞脈經曰脈者氣血之候氣血既微則脈亦微矣沉微則補陰浮微則補陽調補之道以此為準凡得是脈必羸弱氣虛為宜故風勞氣虛之病多得是脈柳氏曰脈分四時春夏發生長旺畏見此脈秋冬見尚庶幾又曰人稟氣以生若微脈太過陽虧氣乏何足以生指下尋之有若無漩之敗血小腸虛崩中日久為白帶漏下多時骨亦枯微脈關前氣上侵當關鬱結氣排心尺下見之臍下積身寒飲水即呻吟微在尺為陰盛陽虛故為身寒不可飲水若飲水則兩寒相搏痛而呻吟也通真子曰多聲池氏曰身寒飲水李氏曰好飲冷水皆非也二沉者陰也指下尋之似有舉之全無緩度三關狀如爛綿舉之不足按之有餘重按乃得有肌肉之下曰沉主氣脹兩脅手足時冷輕指於皮膚間不可得徐按至肌肉中部間應指又按至筋骨下部乃有力此沉脈也沉與浮相反與伏相近沉脈重按乃得於筋骨下部若伏脈則雖重按至筋骨下部亦不見必用指推開筋方可見脈難經曰伏者脈行筋下也內經曰推而內之推而外之皆是用指推筋脈以求之非一定其指於病人臂上俟其脈之自見也此持脈口訣也脈經曰沉者陰脈之始也其象按之至筋骨得之者是也其體沉潛深居諸脈之下有地之氣焉凡諸脈即沉而見則知其在陰而里受之今脈訣曰按之似有狀如爛綿曰沉如此則沉弱沉微沉細之脈又當何如而診之甚失脈經之意矣經曰關以後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及豈有按之似有狀若爛綿之不及也按之似即有舉還無氣滿三焦臟腑虛冷氣不調三部壅通腸健胃始能除按之似有是沉微脈非獨沉也今改云按之即有沉為陰通腸宜溫藥利之寸脈沉兮胸有痰當關氣短痞痛難堪氣短者氣不能相續似喘而實非氣上衝似呻吟而無痛乃氣急而短促也今曰痛難堪則非氣短脈經曰關沉心下有冷氣苦滿吞酸則痛者氣痞不通而痛也若在尺中腰腳重小便稠數色如泔三緩者陰也指下尋之往來遲緩小於遲脈去來亦遲小駃於遲又曰陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等曰緩主四肢煩悶氣促不安緩者二義去來亦遲小駃於遲每居中部或下部間柔軟而慢但小於沉脈兼之緩軟此有邪之診為不及之緩陰陽氣和陽寸陰尺上下同等同浮大而軟無有偏勝此無邪之診為陰陽和緩之緩緩與遲二脈相類緩脈大而慢遲脈小而衰緩者衛有餘而營不足遲者陰氣盛而陽氣衰二診不同遲脈一息三至緩脈一息四至脈經曰緩脈小駃於遲今脈訣反云小於遲脈誤矣四肢煩悶氣促不安皆非緩脈之證來往尋之狀若遲腎間生氣耳鳴時邪風積氣來沖背腦後三針痛即移緩脈關前搐項筋當關氣結腹難伸尺上若逢癥冷結夜間常夢鬼隨人四澀者陰也指下尋之似有舉之全無前虛後實無復次序細而遲往來難且散或一止復來又曰短而止曰澀主腹痛女子有孕胎痛無孕敗血為痛脈來蹇澀細而遲不能流利圓滑澀者澀也與滑相反如刀刮竹竹皮澀又有節刀刮而行澀遇節則倒退有澀脈往來難之意如雨沾沙沙者不聚之物雨雖沾之其體亦細而散有澀脈往來散之意或一止復來是因澀不流利之止與結促代之止不同玉函經曰切脈定知生死路但向止代澀中取看取澀脈與止代此是死期之大概澀脈與外有形證未可斷他殂大命若是形證與代同尺部見之皆死定黎氏曰代者止也一臟絕他臟代至為真死脈不分三部隨應皆是澀者三五不調如雨沾沙為精血不足之候與代相似然三秋診得澀而有胃氣為平脈右手寸口浮短而澀為肺正脈二者皆非死脈若尺寸俱浮緊而澀外證必發熱惡寒項強腰痛牽連百節俱痛乃太陽經傷寒汗之愈舉此數端以見澀脈與代脈不可例觀尺脈者人之根本澀為精血不足之候若獨於尺中見澀則死候也脈經曰澀脈之象往來蹇滯行而多礙夫脈者資血氣而行血氣損傷營衛行澀故脈亦澀脈訣曰按之似有舉之全無是有沉澀無浮澀經曰一陰一陽謂脈來浮而澀也則是浮中亦有澀豈獨沉有澀乎蓋浮而澀者營衛傷沉而澀者精血損表裡之證不同故脈亦異豈獨有里而無表乎難經曰前小後大前大後小其前後以尺寸論也今云前虛後實澀為少血其形蹇滯細短且散安能後實若後實則非澀矣其曰無復次序即內經所謂參伍不調上下如參舂之脈是脈之亂脈亂則死矣今以脈經改之澀脈如刀刮竹行丈夫有此號傷精婦人有孕胎中痛無孕還須敗血成澀脈關前胃氣並當關血散不能停尺部如斯逢逆冷體寒臍下作雷鳴五遲者陰也指下尋之重手乃得隱隱一息三至去來極遲曰遲主腎虛不安中風口喎脈浮而遲則生今脈訣於遲脈曰重手乃得是無浮遲之脈乎立脈之名曰遲以其比平人一息四至減去一至故也今曰隱隱果何所似且如蛛絲曰氣衰如風吹毛曰肺死微甚欲絕伏甚不出則庶可隱隱形容之三至為遲何隱隱乎遲脈人逢狀且難三至為遲一息間遲脈一息三至以至數之至為易見遇其季夏不能痊神工診著知時候道是脾來水必干或是脾虛或腎寒通真子曰遲脈屬腎腎水憂在土土季夏旺潔古云遲本土也當仿此一脈為時勝故長夏勝冬土剋水池氏曰季夏現遲季夏土正旺勝其腎水水必枯病不痊抑脾土滋腎水方為良工以愚考之內經曰脈遲者為臟病難經曰遲者陰也遲為在臟非脾旺脈亦非屬腎之脈假使季夏土旺脾能克腎不緣脈遲阿阿和大而緩是脾之正脈是因季夏時而旺不病之脈若素有腎虛之病則憂之若曰因時旺脈能克所勝則是春肝脈旺必克脾土四時旺脈因序而見人人四時皆病矣今此脈訣之意蓋以夏月萬物盛大陽旺之時而得遲脈為失時反證陰氣大盛脾者陰中之至陰也遲在脾則脾冷腎者亦陰也遲在腎則腎冷內經曰未有藏形於春夏而脈沉澀秋冬而脈浮大命曰逆四時今遲脈在夏亦逆四時也寸口遲脈心上寒當關腹痛飲漿難流入尺中腰腳重厚衣重覆也嫌單六伏者陰也指下尋之似有呼吸定息全無再再尋之不離三關極重按之著骨乃得又曰關上沉不出又曰脈行筋下曰伏主毒氣閉藏三關四肢沉重手足時冷伏脈者初下指輕按不見次尋之中部又不見次重手極按又無其象直待以手推其筋於外而診乃見蓋脈行筋下也若如常診不推筋以求則無所見昧者以為脈絕矣沉脈因按而知伏脈因推而得伏與沉相似沉者重按乃得伏者重按亦不得必推筋乃見也若重按不得推筋著骨全無則脈絕無而死矣脈訣曰指下尋之似有則非伏也呼吸定息全無則脈絕也再再尋之不離三關三關三部一寸九分之位也豈他脈之診乃離舍三關乎此脈訣言伏脈之狀最謬陰毒伏氣切三焦不動營家氣不調不問春秋與冬夏徐徐發汗調理始能消伏為積聚有物為積有營積有衛積有藏積隨所積而施治可也今曰不動營家氣不調是先治營血而氣自調也必也治營積而見伏脈者方可若夫氣積及食物積藏積又當各治其本且氣為是動血為所生者難經曰氣留而不行者為氣先病血滯而不濡者為血後病故先為是動後為所生病以此論之當先調氣而血自順亦有血先病而氣後病者隨病施治可也難乎執一其因物聚者又必以所惡者攻之以所喜者誘之亦不專於先動營也通真子曰伏脈不可發汗更宜消息誠哉是言內經曰其有邪者漬形以為汗其在皮者汗而發之仲景曰脈浮者病在表可發汗又曰表有病脈當浮今伏脈乃在裡之病豈宜發汗雖曰徐徐其動表一也非其治也潔古又引陽盛陰虛汗之則愈以升麻湯麻黃湯麻黃附子細辛湯為治亦非也難經所云仲景所述曰陽盛陰虛者謂傷寒之邪在表為陽在裡為陰邪入皮膚惡寒發熱是表虛而受邪曰陽虛未傳入里里未受邪曰陰盛故云汗之則愈非論伏脈為陰盛也假使陰毒為病正當隨淺深用溫藥祛逐其可發汗邪積氣胸中寸脈伏當關腸癖常暝目尺部見之食不消坐臥不安癥瘕攻痛還破腹七濡者陰也指下尋之似有按之依前卻去極軟而浮細輕手乃得不任尋按曰濡主少氣五心煩熱腦痛耳鳴下元冷極有餘於上曰浮既浮而細曰軟浮而軟細曰濡按之無有舉之則浮細而極軟必輕手乃可得脈經曰如帛衣在水中帛漫在水虛浮見於水面若用指按之則隨手而軟散不與手應此濡脈之狀也濡與遲弱相近一息三至隨浮沉而見曰遲極軟而浮細輕手乃得不能沉曰濡輕軟而沉細按之乃得重按欲絕指下不能起伏不能浮曰弱濡弱遲微之脈皆氣血之不足者也大病後或產婦喜見此等脈平人強人忌見之更隨時隨病消息之脈訣曰指下尋之似有與言伏脈同何是何非耶且諸脈之應皆一來一去如曰來疾去遲曰來盛去不盛以別鉤脈外實內虛之診今曰按之依前卻去其狀果何如耶內經曰軟脈經曰濡同一脈也難經曰春脈弦濡弱而長按之濡舉之來實者腎也沉濡而滑曰石是皆兼他脈以濡在中和為胃氣之本為平脈旺脈若濡脈獨見則病脈也內經曰心脈耎散當消環自已肝耎散病溢飲胃耎散病食痹脾耎散色不澤足胻腫腎耎散病少血其言耎散脈與搏堅而長對言病也故難經亦以氣來虛微來實強對言之非所謂濡與虛弱之診也按之似有舉之無舉全無力按如無脈訣此句全非濡診活人書曰按之似無舉之全無力曰濡今從之髓海丹田定已枯四體骨蒸勞熱甚臟腑終傳命必殂濡脈關前人足汗虛自汗脈訣足字本為充足之足昧者誤以手足之足訓之今改為自汗庶無誤也當關少氣精神散尺部綿綿卻惡寒骨與肉疏都不管八弱者陰也指下尋之如爛綿相似輕手乃得重手乃無怏怏不能前極軟而沉細按之如絕指下曰弱主氣居於表生產後客風面腫弱者扶持不起之狀不能起伏不任尋按大體與濡相類濡脈細軟而浮弱脈則細軟而沉以此別之病後見此脈為順強人平人見之為損為危獨見一部或二部猶庶幾三部六部皆見之甚矣脈經論弱云按之乃得舉之無有今脈訣云輕手乃得重手乃無與脈經相反今改之又弱為虛候氣血損減今雲氣居於表果何證乎表病脈必因浮而見今弱脈沉細在下何以診表素問曰而腫曰風不拘於產後也弱脈亦難以驗風三關脈行怏怏不能前只為風邪與氣連軟細而沉似爛綿少年得此須憂重老弱逢之病卻痊關前弱脈陽道虛關中有此氣多疏虛熱胃虛疏一作氣多粗尤非脈經曰關弱胃氣虛胃中有客熱脈弱為虛熱作病有熱不可大攻之熱去則寒起矣池氏曰關乃陰陽分處脈弱則陰陽隔絕主氣喘李晞範因之今按氣喘者脈必實脈弱則氣乏不足以息今依脈經改之柳氏曰氣虛羸弱弱脈乃見寸弱為陽氣虛尺弱為陰氣虛關弱為胃虛仲景曰諸弱發熱乃弱為陽虛虛而發熱非實熱也大抵陽少陰多皆為不足之候脈經曰弱為虛為悸內經曰脈弱以滑是有胃氣命曰易治脈小弱以澀謂之久病同一弱也以滑澀相兼而易診若在尺中陰氣絕痠疼引變主皮膚陽氣少骨煩發熱痛難居脈經曰尺弱陽氣少發熱骨煩又云少血脈經曰骨煩者腎主骨髓也脈訣作皮膚乃肺之合非腎所主今改之九道通真子曰七表八里為陰陽正脈外有九種脈相通而見者經所謂脈來浮滑而長沉澀而短浮大而牢之類是也以愚觀之脈無正不正之定名也為邪為病而見則二十四字皆不正之脈因時而旺隨臟而應則皆正脈也脈合陰陽難以七表八里為陰陽正脈難經曰浮滑長皆陽脈沉澀短皆陰脈非別以長短為陰陽正脈之外也是長短與浮沉滑澀同為陰陽也又曰外有九種脈相通而見故曰九道且脈之相通乃眾脈參互為一以示證也二十四字除浮沉結促代伏居於上下止於緩急不能相通其他皆相通難經曰一陽一陰謂浮而澀是八里通乎七表也一陰一陽謂沉而滑是七表通乎八里也內經所載仲景所論多通眾脈而言病脈經二十四字有散數無短長脈訣去散數增長短亦以足二十四字脈經論二十四字通為一處亦無次序之定蓋脈隨變而見但宜以陽脈從陽類陰脈從陰類不可以一浮二芤為定序且三至為遲六至為數遲陰在臟數陽在腑經文皆對言也今取遲去數其可乎是知脈不可以二十四字為定數也亦不可立表裡道之異名也陳氏沈氏並用散數為九道用脈訣九道之名數而不取短長亦非也今增散數二脈於後以足脈經之所論而不去長短者脈之所當述者也既不拘於表裡道二十四字之數則脈之以一字立名皆詳論可也或曰子既辨表裡道之非不刪而述其舊文何也曰此朱文公作孝經刊誤程子述大學親民之例也不刪者存其舊也用墨圈者當刪者也辨其下者使人皆知其非不復為舊文所惑不刪之刪也一長者陽也指下尋之三關部如持竿之狀舉之有餘曰長過於本位亦曰長主渾身壯熱坐臥不安從尺至關連寸口直過如橫竿之狀此三部之長脈過於本位謂或尺或關或寸過於一指之外此各部之長脈欲知其病則必於浮沉遲數大小之間求之若不大不小不浮不沉不遲不數則氣自治而無病經曰長則氣治是也大概平人病人脈長為吉深且長壽脈也尺脈長根深蒂固心脈長神氣有餘內經心脈搏堅而長病舌卷不能言至腎脈搏堅而長病折腰此六脈者非以長為病以搏堅相合而病也春肝脈軟弱輕虛而滑端直以長肝脈如循長竿末梢曰平如循長竿曰病有餘而過故也長脈迢迢度三關指下來時又卻還通真子曰此云來時又卻還者似一陰三陽之脈愚曰非也來而還只可謂脈之來去然諸脈皆如是若不能自還則代而死矣一陰三陽者謂脈來浮滑而長時一沉也是四脈共見也陽毒在臟三焦熱徐徐發汗始能安潔古曰此陽明脈尺寸俱長當汗陽化氣也今按假使是陽明證亦難專於發汗正陽陽明當下太陽陽明當汗少陽陽明隨證解利當依表裡分汗下二短者陰也指下尋之不及本位曰短主體虛惡寒腹中冷氣作生氣非宿食不消寸口尺中皆退促附近關中見一半如龜縮頭曳尾之狀以其陰陽不及本位故曰短若關中短上為寸脈下不至關下為尺脈上不至關是陰陽絕脈此皆不治決死故關中不以短脈為診脈經曰短脈之象應指而回不能滿部浮而短者榮衛不行沉而短者臟腑痞塞短與長對知長則知短矣短脈陰中有伏陽氣壅三焦不得昌臟中宿食生寒氣大瀉通腸必得康通真子曰脈訣以一陽三陰脈來沉澀而短時一浮乃云有伏陽耳今按脈訣單論短為陰中伏陽蓋以短為陰脈短為氣病氣不得舒暢則陽氣鬱伏於內非論沉澀短浮四脈共見也內經曰疏其血氣令其條達而致和平今曰大瀉通腸亦當隨病淺深用藥可也三虛者陰也指下尋之不足舉之亦然遲大而軟按之無力隱指豁豁然空曰虛主少力多驚虛脈因按而知其虛其診法與芤同皆以按而見浮大而軟按之中無旁有為芤遲大而軟按之隱指豁豁然空為虛內經曰脈虛血虛二脈皆因血而見失血則中無血虛則中空脈訣言尋之不足舉指亦然乃微濡之脈非所以形容虛也虛與實對實於中為實故浮中沉皆有力內不足為虛故按之豁豁然空恍惚心中多愕驚三關定息脈難成按之無力脈虛輕血生虛臟腑生寒熱煩熱補益三焦便得寧四促者陽也指下尋之極數並居寸口又曰來去數時一止復來曰促漸加則死漸退則生促脈尺微關細寸口獨實而滑數並居於上或來去數時一止復來黎氏曰促脈雖盛疾必時一止復來者如趨之蹶也故徐疾不常促脈前來已出關並居寸口血成斑證危難血成斑非促脈證忽然漸退人生也若或加時命在天五結者陰也指下尋之或來或去聚而卻還脈來緩時一止復來無常數又曰脈來動而中止更來小數中有還者反動曰結主四肢氣悶連痛時來遲而小駛為緩應指暫歇為止緩而止為結通真子曰據經謂往來緩時一止復來為結其言是也此云或來或往聚而卻還與之稍異來去者脈之常也聚而還何以見脈之結今依仲景所論改之脈經只云來緩時一止難經又云無常數今依難經增之蓋止而復來數至間或三兩至或又一止無常數若有常數如五動一止又五動一止依數而止則為死脈可依止數剋死期矣詳見下代脈辨仲景曰藹藹如車蓋曰陽結乃陽氣鬱結於外不與陰氣和雜也累累如循長竿曰陰結乃陰氣鬱結於內不與陽氣和雜也又曰脈浮數能食不大便此為實曰陽結脈沉遲不能食身體重大便反硬曰陰結亦以陰陽氣偏結因兼證而分之不以脈止為結也內經曰結陽者腫四肢四肢者諸陽之本也結陰者便血陰主血也二陽結謂之消謂大腸胃熱三陽結謂之隔謂小腸膀胱熱三陰結謂之水謂脾肺寒一陰一陽結謂之喉痹謂心主三焦熱是亦分陰陽之結也王氏脈經蓋因仲景之文於脈緩止卻為結陽數止卻為結陰誤甚詳述在代脈下其實脈訣之結脈為陰與促脈為陽相對非若內經與仲景所言有陰陽之分也若必論陰陽結則緩而止為結陰數而止為結陽方允當積氣生於脾臟旁大腸疼痛卒難當漸宜稍瀉三焦火莫謾多方立紀綱六代者陰也指下尋之動而復起冉冉不能自還動而中止不能自還因而復動曰代主形容羸瘦口不能言代者此脈已絕他脈代其至之義一臟氣絕而他臟之氣代而至也代與止異者止者按之覺於指下而中止代者忽還尺中停久方來則是歇至數動止而復來因其呼吸陰陽相引乃復動也今脈訣曰動而復起則不代矣是不明動而中止為代也冉冉不能自還之下卻不言因而復動是不能自還之後脈絕不來矣今以仲景原文改之內經曰代則氣衰脾脈代注云耎弱也仲景曰傷寒脈結代心動悸炙甘草湯主之皆不以代為死脈也王氏脈經始曰脈結者生代者死仲景言結代脈曰脈按之來緩時一止復來名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治王氏脈經述之而與仲景本文有差仲景兩明結脈總曰陰也脈經分前一論來緩時一止名曰結陽多添一陽字於後一論中有還者反動改作不能自還舉之則動卻依本文曰結陰也以前為結陽則脈緩非陽也此蓋脈訣所謂結脈以後為結陰則脈數乃陽也此蓋脈訣所謂促脈且不能自還與代脈同何以為結脈且結代同而中止皆同自還為結不能自還為代正以分二脈之異今混而同之不可也代則血氣衰虛不能相續因其呼吸相引復動此所以代為難治活人書云陰盛則結主胸滿煩躁陽盛則促主積聚氣痞憂思所成大抵結促二脈雖時一止為病脈非死脈也代則真死矣或曰死脈必代而代脈未必皆死者何也人見其脈動搖來往略有一止便以為代便以為死鮮有不失者蓋代脈固以其有止而有止者未可便以為代何也諸脈有止者四澀促結代也脈細而遲往來難時一止者為澀脈來數時一止者為促脈來緩時一止者為結凡此三者均謂之止而其所以止者迥然不同為病亦異而皆非死脈也甄別於此毫髮不爽見其所謂止者不過於澀促結中之止則隨脈主病真見其止如代中之止然後斷之為死則不失矣代脈之止其止有常數而不忒如十動一止則數十止皆見於十動之後如二十動一止則數十止皆見於二十動之後及加進亦如是方為代脈王氏脈經於代脈依仲景卻改脈來作來數則又混促脈之止必全依仲景本文方是代脈時時動若來動而中止不能還再而復動似還無復動因為代脈看三元正氣隨風去魂魄冥冥何所拘升沉旦夕間曰動若來則不止也一作動若浮尤悖理潔古亦隨繆解之何也曰似還無於脈狀何似故改之七牢者陰也指下尋之則無按之則有似沉似伏實大而長微弦曰牢主骨間疼痛氣居於表尋之則無按之則有則沉脈也可以言牢脈所見之位而失言牢脈之本狀似沉似伏者牢脈所居之位也實大而長微弦者牢脈之形也脈經曰有似沉伏沈氏分言似沉似伏尤為明著又曰低而不浮曰沉按之極下曰伏隱指逼逼曰實滿指洪盛曰大過於本位曰長緊而直曰弦兼是數者為牢脈黎氏曰牢者堅也固圍之象氣之鬱結故如此柳氏曰牢實不轉移主有積聚主疼痛不移其處得此一脈病邪牢堅其病難愈沈氏曰陰陽革否其氣沉伏在下固結不移其氣欲上出而不得故曰革也今按古今多以革與牢混論素問云渾渾革至如湧泉綿綿其去如弦絕死曰革至如湧泉流出之甚也綿綿其去流而不返義如弦絕者若弓弦琴瑟絃斷絕不可再續故云死王貺曰革脈渾渾如湧泉謂出而不返也為陰氣隔陽又為溢脈溢脈蓋自尺而出上於魚際離經無根本又有覆脈自寸口下退過而入尺皆必死此等脈見於兩手或一手難以逐部求或曰牢脈即黃帝之所謂革脈千金翼亦以革為牢是以革牢同一義然內經渾渾革至如湧泉則此革不與脈經沉伏之革同矣然則牢革兩義也難經曰牢而長者肝也牢陰長陽因沉而得為肝之平脈又曰脈之虛實濡者為虛緊牢者為實以邪氣之盛為實也此牢也仲景曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半產漏下男子則亡血失精此革也機按牢主邪氣實革主精血虛或又曰如撓鼓皮鼓皮可以言革而於實大弦長難以取象脈經曰三部脈革長病得之死卒病得之生兼病以斷也難經曰病若吐血復鼽衄血者脈當沉細反得浮大而牢者死脈病相違也仲景曰寒則牢堅脈書往往以牢革為一有牢則無革有革則無牢究而言之諸書所謂牢者堅也緊牢為實仲景所謂革者虛寒相搏也脈形脈理二者不同不可混也因牢論革及此若內經渾渾革至云者又別作一樣看可也脈入皮膚辨息難實大弦長沉伏間牢脈居沉伏之位非入皮膚之浮部也牢以脈形固結鬱而在下不與遲數辨息多少以立名故改之時時氣促在胸前只緣水火相刑剋若待痊除更問天牢脈亦難以為水火相刑之象五行各有相刑皆有死症八動者陰也指下尋之似有舉之還無再再尋之不離其處不往不來若數脈見於關上上下無頭尾如豆大厥厥動搖曰動主體弱虛勞崩中血痢仲景云動脈若數脈見於關上上下無頭尾如豆大厥厥動搖王氏脈經依仲景文而去若數脈及上下五字止云見於關上無頭尾如豆大厥厥動搖夫動必因數而後見此五字不可除也脈訣並不遵依卻自云尋之似有舉之還無乃微弱沉之狀動脈厥厥動搖出於眾脈豈舉之還無乎不離其處果何處也動見於關不能如眾脈通三部而見內經曰脈不往來者死若不往不來則脈定而死矣眾書以動為陽脈訣以動為陰此脈居關上陰陽相搏為動當以陽動為陽陰動為陰方當內經曰手少陰脈動甚者妊子也謂手少陰俞神門穴中脈動甚為有妊之兆非言動脈之狀言動脈始於仲景曰陰陽柑搏名曰動陽動則汗出陰動則發熱形寒惡冷此三焦傷也成無己曰方其陰陽相搏而虛者則動陽虛則陽動故汗出陰虛則陰動故發熱如不發熱汗出而反形冷惡寒為三焦傷陽氣不通龐安常曰關位佔六分前三分為陽後三分為陰若當陽連寸口動而陰靜法當有汗而解素問曰陽加於陰謂之汗若當陰連尺動而陽靜則發熱素問曰尺粗為熱中若大汗後形冷惡寒者三焦傷此是死證動脈只在關上見惟龐說分明成氏又曰陽出陰入以關為界關為陰陽之中也若數脈見關上無頭尾如豆大動搖者是陰陽之氣相搏也厥厥動搖者自為動搖不與三部混也如人在眾中不與眾合名之厥厥沈氏曰陽動者陽不能衛於膚腠故汗出也陰動者陰不能榮於肌肉故發熱又仲景云陽微則惡寒陰弱則發熱是也動脈根源氣主陰陰陽相搏形三關指下礙沉沉關中如豆動搖頻動脈見關上不見於三關厥厥動搖不沉沉礙指下也池氏承訛謬解故改之血出一倒經年月智士名醫不可尋為痛為驚載脈經內經曰陰虛陽搏謂之崩陰脈不足陽脈盛搏則內崩血流下此動脈為血崩者即仲景所謂陰動也陰虛內損動數見焉豈陽搏乎九細者陰也指下尋之細細如線來往極微小大於微常有且細曰細主足脛髓冷乏力少氣脈經曰細者陰也直細而軟若絲線之應指主血少氣衰有此症則順非此而得之為逆故吐衄血得沉細則生蓋血行脈中血既減少脈所以細也然雖血少未至於失血故脈止於細未至於無血失脈亦失故芤主失血是知芤為失血細為血少今脈訣言細脈乃云來往極微則微之又微非細矣今改之乏力無精脛里酸形容憔悴發毛干如逢冬季經霜月不療其疾必自痊冬季後陽氣生或可復其生理耳亦不可言不療自痊今增散數二脈以足脈經之本旨數者陽也一息六至又曰去來促急為數經曰數則為熱必審其浮沉知其熱在表裡察其大小知其熱之盛衰亦有如數之脈經曰脈至如數令人暴驚宜細詳之沈氏曰以陰陽言數為陽脈以臟腑言數為腑病論邪則為熱論病則為虛若夫微數之脈傷寒則謹不可汗無病則謹不可勞此先賢之格言內經曰數為煩心惟小兒之脈一呼吸間八至而細數者為平耳散者大而散者是也氣失血虛有表無里故脈散也沈氏曰散者不聚之名仲景曰傷寒咳逆上氣其脈散者死也若脈有邪氣風也難經曰浮而大散者心也最畏散脈獨見獨見則危矣柳氏曰是散漫無統紀無拘束之義指下見得來動一二至中又至一至更不曾來往整齊或動來即動去或來至多去至少或去至多來至少是解散不收聚精血走作根本脫離不佳之兆若產婦得之則生子孕婦得之為墮傷尋常心脈及夏月最不宜獨見此脈
