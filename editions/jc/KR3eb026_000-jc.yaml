body:
  text: 附錄診脈早晏法岐伯曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分機按診法以平旦主無病者言若遇有病則隨時皆可以診不必以平旦為拘也於此又知前聖決死生之分不專於脈必須察色觀形以此相參伍也今世專尚診脈而不復問其餘是不知前聖垂訓之意也故表而出之示警後人十二經皆有動脈獨取寸口以決五腑六腑死生吉凶之候者然寸口脈之大會手太陰之動脈也脈行五十度周於身而復會於手太陰太陰者寸口也即五臟六腑之終始故取法於寸口機按此以氣口決死生者謂氣口為五臟主也難經四難言五臟皆以胃氣為主其脈在關上是人之生死亦繫於關上八難十四難又言人之有尺譬如樹之有根脈有根本人有元氣故知不死是生死又繫於尺脈也可見寸關尺各有所歸重故越人所以錯綜其義也寸關尺脈經曰從魚際至高骨卻行一寸其中名曰寸口從寸至尺名曰尺澤故曰尺寸寸後尺前名曰關陽出陰入以關為界陽出三分陰入三分故曰三陰三陽陽生於尺動於寸陰生於寸動於尺機按難經曰尺寸脈之大要會也從關至尺是尺內陰之所治也從關至魚際是寸內陽之所治也故陰得尺內一寸陽得寸內九分尺寸始終一寸九分故曰尺寸也於一寸九分之中曰尺曰寸而關在其中矣一難言寸口脈之大會以肺朝百脈而言也此言尺寸為脈之大要會以陰陽對待而言也大抵尺陰寸陽人之一身經絡榮衛五臟六腑莫不由於陰陽而或過與不及於尺寸見焉故為脈之大要會也一說古法寸部佔九分關尺部各佔一寸三部共二寸九分若臂短者亦依此法則頭指診在關部次指診在尺部第三指診在閒處如何知病之所在今但以高骨為準揣得高骨壓中指於高骨以定關位然後下前後兩指以取尺寸不必拘九分一寸之說也五臟六腑脈所出以輕重分臟腑左寸心小腸脈所出重按至血脈浮大而散者心脈也屬臟或謂浮澀而短輕按至皮毛浮滑而長者小腸脈也屬腑左關肝膽脈所出重按至筋骨沉短而弦急者肝脈也屬臟輕按至皮毛弦緊而浮長者膽脈也屬腑左尺腎膀胱脈所出重按至筋骨沉而遲者腎脈也屬臟輕按至皮毛沉實而稍疾者膀胱脈也屬腑右寸肺大腸脈所出微重按於皮肉浮短而澀者肺脈也屬臟輕按至皮毛浮短而疾者大腸脈也屬腑右關脾胃脈所出重按至肌肉緩而遲者脾脈也屬臟輕按至皮毛微緩而稍疾者胃脈也屬腑右尺命門三焦脈所出重按至筋骨沉實而疾者命門脈也屬臟輕按至皮毛沉實而稍疾者三焦也屬腑機按命門三焦配合右尺刊誤辯之詳矣茲不復贅但此與刊誤並以輕重而分診臟腑之脈不知何所據也意者臟屬陰主沉腑屬陽主浮故以義取輕重為診式耶他本又謂內以候臟外以候腑其義亦猶此也然考之脈經及素難諸書只論五臟之脈於六腑之脈雖言之而不詳六腑病脈雖間或言之診法輕重亦未之及蓋謂臟脈可以兼腑歟抑謂能知臟脈而腑脈無勞診歟或病在六腑為輕而脈無要緊耶愚皆莫解其意也且所論五臟脈狀及六腑脈狀與下篇大不相侔亦不知其何所本也故著之以俟明者五臟平脈心脈浮大而散心合血脈故心脈循血脈而行持脈指法如六菽之重按至血脈而得者為浮稍稍加力脈道粗者為大又稍加力脈道闊軟者為散余仿此機按菽豆也指按如六豆之重也肺脈浮澀而短肺合皮毛故脈循皮毛而行持脈指法如三菽之重按至皮毛而得者為浮稍稍加力脈道不利為澀又稍加力不及本位曰短肝脈弦而長肝合筋故肝脈循筋而行持脈指法如十二菽之重按至筋脈道與箏弦相似為弦次稍加力脈道迢迢者為長脾脈緩而大脾合肌肉故脾脈循肌肉而行持脈指法如九菽之重按至肌肉如微風輕颭柳梢之狀為緩次稍加力脈道敦實者為大腎脈沉而軟滑腎合骨故腎脈循骨而行持脈指法按至骨上而得者為沉次重按之脈道無力為軟舉指來疾脈道流利者為滑凡此五臟平脈須要察之久久成熟一遇病脈自然可曉經曰先識經脈而後識病脈此之謂也六腑平脈出診脈須知左寸手太陽小腸脈洪大而緊一云洪大而長為受盛之官名受盛之府左關足少陽膽脈弦大而浮一云大而浮一云乍數乍疏乍短乍長一云乍大乍小乍短乍長與祟脈無異何以區別然兩手三部皆然方為祟脈今獨左手關部如此則謂之膽脈可也膽為中正之官名清淨之府相火膽與風肝合脈急則為驚左尺足太陽膀胱脈洪滑而長膀胱為州都之官名津液之府寒水膀胱與君火腎合脈急則為瘕或曰心脈居午謂之君火宜也今腎脈居子亦謂之君火何義又命門脈為心主居亥謂之相火宜也今膽脈居寅亦謂之相火又何邪內經天元紀論鬼臾區曰子午之歲上見少陰巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之少陽之上相火主之而釋者謂午亥之歲為正化子巳之歲為對化由此言之則心腎皆可言君火以其熱氣主之也厥陰既主風氣而手厥陰命門不當以相火言少陽既主其相火則膽與三焦為相火明矣右寸手陽明大腸脈浮短而滑一云短而澀為傳道之官名傳道之府右關足陽明胃脈浮長而滑一雲浮大而短為倉廩之官名水穀之府燥金胃與濕土脾合右尺手少陽三焦脈洪散而急為決瀆之官名外府機按以上但言六腑脈狀而診法輕重內外俱未及論學者宜更考之四時平脈凡診脈須先要識時脈胃脈與臟腑平脈然後及於病脈時脈謂春三月六部中俱帶弦夏三月俱帶洪秋三月俱帶浮冬三月俱帶沉胃脈謂中按得之脈和緩臟腑平脈已見前章凡人臟腑脈既平胃脈和又應時脈乃無病者也反此為病又曰三部之內大小浮沉遲數同等尺寸陰陽高下相符男女左右強弱相應四時之脈不相戾命曰平人其或一部之內獨大獨小偏遲偏疾左右強弱之相反四時男女之相背皆病脈也凡脈見在上曰上病在下曰下病左曰左病右曰右病左脈不和為病在表為陽主四肢右脈不和為病在裡為陰主腹臟以次推之三部所主附九候診脈之時人臂長則疏下指臂短則密下指寸為陽為上部主頭項以下至心胸之分關為陰陽之中為中部主臍腹胠脅之分尺為陰為下部主腰足脛股之分凡此三部之中每部各有浮中沉三候三而三之為九候也持脈之要有三曰舉曰按曰尋輕手取之曰舉重手取之曰按不輕不重委曲求之曰尋初持脈輕手候之脈見皮膚之間者陽也腑也亦心肺之應也所謂浮按消息是也重手取之脈附於肉下者陰也臟也亦腎肝之應也所謂沉按消息是也不輕不重中而取之脈應於血肉之間者陰陽相適中和之應脾胃之候也所謂中按消息是也若浮中沉之不見則委曲求之若隱若見則陰陽伏匿之脈也所謂推而內之是也三部皆然一說左寸浮候左頭角中候左脅沉候少陰心左關浮候小腸膽中候左脅沉候厥陰肝左尺浮候膀胱中候左腰沉候腎右寸浮候右頭角中候兩耳目沉候肺右關浮候胃中候胸中沉候脾右尺浮候三焦中候右腰沉候命門診候推移指法推而外之消息之內而不外有心腹積也推而內之消息之外而不內身有熱也推而上之消息之上而不下腰足清也推而下之消息之下而不上頭項痛也左寸外以候心內以候膻中左關外以候肝內以候膈右寸外以候肺內以候胸中右關外以候胃內以候脾兩尺外以候腎里以候腹中是以有推而內推而外消息之法也一說左寸推而上之上而不下頭項痛也推而下之下而不上胸脅痛也推而內之內而不外心腹積也推而外之外而不內眼目昏也左關推而上之上而不下腰足清也推而下之下而不上腸胃痛也推而內之內而不外筋骨痛也推而外之外而不內主身有熱也左尺推而上之上而不下小腸痛也推而下之下而不上足脛痛也推而內之內而不外小便濁也推而外之外而不內腰足痛也右寸推而上之上而不下氣喘急也推而下之下而不上胸中痛也推而內之內而不外咽喉痛也推而外之外而不內背脊痛也右關推而上之上而不下吐逆也推而下之下而不上主下血也推而內之內而不外腹有蟲也推而外之外而不內肌肉痛也右尺推而上之上而不下小腹脹也推而下之下而不上足脛痛也推而內之內而不外疝瘕也推而外之外而不內小便秘也機按消息謂詳細審察也推謂以指挪移於部之上下而診之以脈有長短之類也又以指挪移於部之內外而診之以脈有雙弦單絃之類也又以指推開其筋而診之以脈有沉伏止絕之類也刊誤謂內外以指按輕重言推有數義故特著之非但外以候心內以候膻中之類也自一說以下所論亦無所據姑錄之以備參考察脈須識上下來去至止六字不明此六字則陰陽虛實不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰也上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮膚之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止也若短小而見於肌肉之間陰乘陽也洪大而見於肌肉之下陽乘陰也寸尺皆然診脈須辨表裡虛實四字表陽也腑也凡六淫之邪襲於經絡而未入胃腑及臟者皆屬於表也里陰也臟也凡七情之氣鬱於心腹之內不能散越飲食之傷留於臟腑之間不能流通皆屬於里也虛者元氣之自虛精神耗散氣力衰弱也寶者邪氣之實由正氣之本虛邪氣乘之非元氣之自實也故虛者補其正氣實者瀉其邪氣經曰所謂虛實邪氣盛則實精氣奪則虛此大法也脈者血氣之先也氣血勝則脈勝氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈治又長人脈長短人脈短肥人脈沉瘦人脈浮性急人脈急性緩人脈緩左大順男右大順女男子尺脈常弱女子尺脈常盛此皆其常也反之者逆千金翼云人大而脈細人細而脈大人樂而脈實人苦而脈虛性急而脈緩性緩而脈躁人壯而脈細人羸而脈大此皆為逆逆則難治反此為順順則易治凡婦人脈常欲濡弱於丈夫小兒四五歲脈呼吸八至細數者吉男左大為順女右大為順脈貴有神東垣云不病之脈不求其神而神無不在也有病之脈則當求其神之有無如六數七極熱也脈中有力則有神矣為瀉其熱三遲二敗寒也脈中有力則有神矣為去其寒若數極遲敗中不復有力為無神也將何所恃邪苟不知此而遽瀉去之神將何所依而主邪經曰脈者氣血之先氣血者人之神善夫凡取脈之道理各不同脈之形狀又各非一凡脈之來不必單至必曰浮而弦浮而數沉而緊沉而細之類將何以別之大抵提綱之要不出浮沉遲數滑澀之六脈也浮為陽輕手得之而芤洪大散長濡弦皆輕手而得之之類也沉為陰重手得之而伏石短細牢實皆重手而得之之類也遲者一息脈二至而緩結微弱者皆遲之類也數者一息脈六至而疾促皆數之類也或曰滑類乎數澀類乎遲然脈雖似而理則殊彼遲數之脈以呼吸察其至數之疏密此滑澀之脈則以往來察其形狀也機按脈雖種種不同而浮沉遲數四脈可以統之但識四脈則諸脈之象可以類推難經於六難專言浮沉九難專言遲數既以四脈為重近世陳無擇諸人亦皆言浮沉遲數可統諸脈良有旨哉浮之有力為洪為長為革浮之無力為芤為虛為微為濡為散皆浮脈所統也沉之有力為弦為牢為實沉之無力為短為細為弱沉極為伏皆沉之所統也遲之有力為緩為結遲之無力為澀為代皆遲之所統也數之有力為滑為動為緊數之無力為促皆數之所統也脈之提綱不出六字者蓋以其足以統夫表裡陰陽冷熱虛實風寒燥濕臟腑血氣也浮為陽為表診為風為虛沉為陰為里診為濕為寒實遲為在臟為寒為冷數為在腑為熱為燥滑為血有餘澀為氣獨滯也人一身之變不越乎此能於是六脈之中審求之則疢疾之在人者莫能逃焉一說浮有力主風無力主虛沉有力主積無力主氣三因方為濕為實沉有力主痛無力主冷數有力主熱無力主瘡為燥八段錦第一平鋪三指闊初持脈時不必便尋三部且闊鋪三指從尺外臂內稍稍挪上探摸要知皮膚端的方可診候三部十三難曰脈數而尺之皮膚亦數等語古人先診視三部然後參以尺之皮膚尺之皮膚者第三部尺中脈之外臂肉內皮上也此處不診動脈但探試皮膚或數或急或緩或澀或滑故以尺中皮膚言之所以欲知尺之皮膚者欲以此法先得其身之冷熱形之腴瘠膚之疏密則淺深內外久近之疾可得而識也丁氏曰臂內數者皮膚熱臂內急者經絡滿實緩者肌肉消愚故云數言臂肉皮膚熱便知病亦是熱皮膚不熱者病亦是不熱其他極冷與非冷非熱可以類推矣急言其肉實而皮急是近病營衛未消耗也緩言其肉皮寬是久病營衛已消耗也澀言皮膚不滑澤腠理閉無汗然也滑言其潤滑腠理疏汗多然也古人言不盡意舉此五者言之大意可見或者不用三指只以一指自上至下逐部按之未嘗不可然不可以得尺之皮膚不足法也尺之皮膚或男或女只看一手便見第二三部准高骨人兩手掌後各有高骨欲診三部先以中指揣得高骨名為關上既得高骨微微抬起中指以食指於高骨之前取寸口脈診寸口畢則微微抬起食指再下中指取關上脈診關上畢復微微抬起中指又下無名指於高骨之後取尺中脈診候之時不可正對患人要隨左右偏立兩傍慎容止調鼻息專念慮然後徐徐診候若乖張失次非法矣一說凡診脈以氣息平定方可下指病者禁聲勿言醫者閉息莫語寂然敬靜絕無外聽初則浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指內消息之其詳見前推移用指法第三指法定宗源崔劉二師止以浮沉遲數四脈定風氣冷熱四病以概百疴原此四者止是雜症若卒診傷寒外感之疾則有不可通者今取仲景平脈法參以崔劉所傳庶幾並用而無遺恨其曰浮風沉氣遲冷數熱此祖訣論雜病者也其曰浮在表沉在裡遲在臟數在腑今所定傷寒診法也須要知得傷寒與雜症診法皆須以浮沉遲數四脈為宗而又各有其類不可混淆必得此訣然後可讀脈書不然則泛無統會也第四通融葉於一以前法定得病症又以病症參驗前法既因脈以知病復隨病以考脈融會貫通反復探討實得病名歸一而後止凡診脈最難有脈病相應者有不相應者有病得易愈之脈者有治之而即瘥者有治之而增劇者大要以我簡易馭彼繁難以我之一心制彼之萬變此所謂通一舉萬之道也第五觀形勿泥形脈經曰五臟各有聲色臭味當與寸口尺內相應其不相應者病也是知觀形察色與寸口尺內相應此古法也謂如色青是肝病當得弦而急肝脈之類然仲景法又不止察五臟色脈而已必觀其起居動靜及諸外症可以望而知之者要當目睹心推洞見端的方斷吉凶豈但察五臟別五色而已哉第六聞聲不在聲經云聞而知之謂之聖亦如察色以五臟所主相參故曰聞其五音以別其病此亦幾於拘泥如中風不語為入臟然有無故而喑脈不至不治自愈為氣暴逆者雖與中風不語相似而實不同又如傷寒譫語為陽明病胃中有燥屎當下則愈與虛病譫語正氣脫絕精神散亂若下之則為重虛此處一差禍如反掌又曰聲重咳嗽固為寒邪亦有風熱上壅及勞嗽失聲而為肺痿難愈之症症同實異然則聽聲之法豈可以宮商角徵羽之五音而定五臟之病哉須將患人之言語聲音與病家來請語言及他一切旁觀物議皆當審聽入耳注心斯乃聞聲之道非古法所能盡也第七發言須當理望聞問切謂之神聖工巧問症本第三法切脈本第四法今世道不古以切脈反居第一以問視為最末抱病不惟不言雖再三義詢叩終亦不告反謂醫拙甚至有隱疾而困醫者醫固為爾所困不思身亦為醫所困矣果何所益哉雖然為醫者亦須貴乎有學大率診視已畢不可便指病名發言猝易須從所得脈象說起廣引經書以為證據然後由淺而深說歸病症務要精當確實不可支離狂妄說證已畢然後徐徐問其所苦或論說未盡使患者一一詳告卻以彼說較吾所診或同或異而折衷之如此則望聞問切四法兼全彼我之間交相孚契既無所惑必收全功第八慈憫濟蒼生孫思邈云凡醫治病必須安神定志無欲無求不論貴賤貧富視為一等皆如至親亦不得瞻前顧後自慮吉凶護惜身命見彼苦惱若已有之深加惻愴勿避險巇一心救難無存形跡如此可謂慈憫濟蒼生太醫反此則含靈巨賊今考斯言切中世醫之病衡陽羅氏云今之醫者每每毀訾前醫驚恐病家意圖厚賂尤為不仁之甚昔皇子病瘈瘲國醫莫能治長公主因言錢乙起草野有異能立召入進黃土湯而愈神宗問此何以能愈斯疾對曰以土勝水木得其平則風自止且諸醫治亦將愈小臣適逢其愈上悅其對擢太醫丞學者能以仲陽之心為心則善矣愚謂醫本末技若不謀利不計功則為仁人苟患得患失則無所不至矣況用心不仁之人自有果報故於診視之中備述孫真人錢醫丞嘉言善行以為吾徒勉怪脈雀啄連來三五啄脈經曰雀啄者脈來數而疾絕止復頓來也診脈要訣云主脾元穀氣已絕胃氣無所榮養其脈來指下連連湊指數急殊無息數但有進而無退頓絕自去良久准前又來宛如雞踐食之貌但數日之壽也王叔和雲雀啄頓來而又住據此云脾絕之脈蕭處厚謂之心絕吳仲廣謂之木脈其說尤遠當以脾絕為是屋漏半日一點落脈經曰屋漏者其來既絕而止時時復起而不相連屬也王叔和云屋漏將絕而復起吳仲廣云脈來指下按之極慢一息之間或來一至若屋漏之水滴於地上而四畔濺起之貌主胃經已絕穀氣空虛立死之候據此云胃絕而蕭處厚又謂心肺絕何耶彈石硬來尋即散脈經曰脈來如彈石去如解索者死彈石者辟辟急也解索者動數而隨散亂無復次序也蕭處厚謂肺絕之脈吳仲廣謂肝絕當以謂腎絕為正蓋石乃腎之本脈合沉濡而滑今真藏脈見如彈石劈劈然湊指殊無息數死無疑矣一說脈來指下如堅硬之物擊於石貌劈劈然無息數搭指散亂真解索解索見前彈石下吳仲廣云解索脈者其形見於兩尺脈來指下散而不聚若分於兩畔更無息數是精髓已耗將死之候機按脈經云來如彈石去如解索似通指一脈來去而言也今此分為二脈則與脈經相反矣宜考之魚翔似有一似無脈經云魚翔者似魚不行而但掉尾動頭身搖而久住者是也王叔和云魚躍澄澄而遲疑掉尾吳仲廣云脈來指下尋之即有泛泛高虛前定而後動殊無息數宛如魚遊於水面頭不動而尾緩搖之貌主腎與命門俱絕衛氣與營氣兩亡旦占夕死蝦游靜中跳一躍脈經曰蝦游者冉冉而起尋復退沒不知所在久乃復起起輒遲而沒去速者是也王叔和云蝦游冉冉而進退難尋吳仲廣云脈來指下若蝦游於水面沉沉不動瞥然驚掉而去將手欲趁杳然不見須臾於指下又來良久准前復去如蝦游入水之形瞥然而上倏然而去此是神魂已去之候一說脾胃絕也寄語醫家子細看此脈一見休餌藥矯世惑脈論汪機撰夫脈者本乎營與衛也而營行於脈之中衛行於脈之外也苟臟腑和平營衛調暢則脈無形狀之可議矣或六淫外襲七情內傷則臟腑不和營衛乖謬而二十四脈之名狀層出而疊見矣是故風寒暑濕燥火此六淫也外傷六淫之脈則浮為風緊為寒虛為暑細為濕數為燥洪為火此皆可以脈而別其外感之邪也喜怒憂思悲恐驚者此七情也內傷七情之脈喜則傷心而脈緩怒則傷肝而脈急憂則傷肺而脈澀思則傷脾而脈結恐則傷腎而脈沉悲則氣消而脈短驚則氣亂而脈動凡此者皆可以脈而辨其內傷之病也然此特舉其常而以脈病相應者為言也若論其變則有脈不應病病不應脈變出百端而難一一盡憑於脈矣試舉一二言之張仲景云脈浮大邪在表為可汗若脈浮大心下硬有熱屬臟者攻之不令發汗此又非浮為表邪可汗之脈也又云促脈為陽盛宜用葛根黃芩黃連湯若脈促厥冷為虛脫非灸非溫不可此又非促為陽盛之脈也又云遲脈為寒沉脈為里若陽明脈遲不惡寒身體濈濈汗出則用大承氣此又非諸遲為寒之脈矣少陰病始得之反發熱而脈沉宜麻黃細辛湯微汗之此又非沉為在裡之脈矣凡此皆脈難盡憑之明驗也若只憑脈而不問症未免以寒為熱以表為里以陰為陽顛倒錯亂而夭人長壽者有矣是以古人治病不專於脈而必兼於審症良有以也奈何世人不明乎此往往有病諱而不言惟以診脈而試醫之能否診之而所言偶中便視為良醫傾心付託篤意委任而於病之根源一無所告藥之宜否亦無所審惟束手聽命於醫因循遂至於死尚亦不悟深可悲夫彼庸俗之人素不嗜學不識義理固無足怪近世士大夫家亦未免狃於此習是又大可笑也夫定靜安慮格物致知乃大學首章第一義而慮者謂處事精詳格物者謂窮致事物之理致知者謂推極吾之所知凡此數事學者必常究心於此矣先正又曰為人子者不可以不知醫病臥於床委之庸醫比之不慈不孝夫望聞問切醫家大節目也苟於臨病之際惟以切而知之為能其餘三事一切置而不講豈得為知醫乎豈得為處事精詳乎豈得為窮致事物之理而推極吾之所知乎又豈得為父而慈為子而孝乎且醫之良亦不專於善診一節苟或動靜有常舉止不妄存心而忠厚發言而純篤察病詳審處方精專兼此數者亦可謂之良矣雖據脈言症或有少差然一脈所主非一病故所言未必盡中也若以此而遂棄之所謂以二雞子而棄干城之將烏可與智者道哉姑以浮脈言之脈經云浮為風為虛為氣為嘔為厥為痞為脹為滿不食為熱為內結等類所主不下十數種病假使診得浮脈彼將斷其為何病耶苟不兼之以望聞問而欲的知其為何病吾謂戛戛乎其難矣古人以切居望聞問之後則是望聞問之間已得其病情矣不過再診其脈看病應與不應也若病與脈應則吉而易醫脈與病反則凶而難治以脈參病意蓋如此曷嘗以診脈知病為貴哉夫脈經一書拳拳示人以診法而開卷入首便言觀形察色彼此參伍以決死生可見望聞問切醫之不可缺一也豈得而偏廢乎噫世稱善脈莫過叔和尚有待於彼此參伍況下於叔和萬萬者耶故專以切脈言病必不能不至於無誤也安得為醫之良抑不特此世人又有以太素脈而言人貴賤窮通者此又妄之甚也予嘗考其義矣夫太者始也初也如太極太乙之太素者質也本也如繪事後素之素此蓋言始初本質之脈也始初本質之脈果何脈耶則必指元氣而言也東垣云元氣者胃氣之別名胃氣之脈蔡西山所謂不長不短不疏不數不大不小應手中和意思欣欣難以名狀者是也無病之人皆得此脈以此脈而察人之有病無病則可以此脈察人之富貴貧賤則不可何也胃氣之脈難以形容莫能名狀將何以為貴賤窮通之診乎竊視其書名雖太素而其中論述略無一言及於太素之義所作歌括率多俚語全無理趣原其初志不過托此以為僥利之媒後世不察遂相傳習莫有能辯其非者或又為之語曰太素云者指貴賤窮通稟於有生之初而言也即脈可以察而知之非謂脈名太素也予曰固也然則太素之所診者必不出於二十四脈之外矣夫二十四脈皆主病言一脈見則主一病貧富貴賤何從而察知哉假如浮脈其診為風使太素家診之將言其為風耶抑言其為貴賤窮通耶二者不可得兼若言其為風則其所知亦不過病也若遺其病而言其為貴賤窮通則是近而病諸身者尚不能知安得謂之太素則遠而違諸身者必不能知之也蓋貴賤窮通身外之事與身之血氣了不相干安得以脈而知之乎況脈之變見無常而天之寒暑不一故四時各異其脈不能必其久而不變是以今日診得是脈明日診之而或非春間診得此脈至夏按之而或否彼太素者以片時之尋按而斷人一生之休咎殆必無是理然縱使億則屢中亦是捕影捉蛇彷彿形象安有一定之見哉噫以脈察病尚不知病之的而猶待於望聞問切況能知人之貴賤窮通乎使脈而能知貴賤窮通則周公之易邵子之數希夷之相子平之命皆不必作矣何聖人之不憚煩也何後世不從其脈之簡便而猶以卜占風鑑星命而談不絕口哉且脈肇於岐黃演於秦越而詳於叔和遍考素難脈經並無一字語及此者非隱之也殆必有不可誣者矣若果如太素所言古人當先為之矣又何待後人之馳騁耶巢氏曰太素脈者善於相法特假太素以神其術耳誠哉言也足以破天下後世之惑矣又有善伺察者以言餂人陰得其實故於診按之際肆言而為欺罔此又下此一等無足論也雖然人稟天地之氣以生不能無清濁純駁之殊稟氣之清者則必形質清血氣清而脈來亦清清則脈形圓淨至數分明吾診乎此但知其主貴與富而已若曰何年登科何年升授何日招財何年得子吾皆不得而知矣稟氣之濁者則必形質濁氣血濁而脈來亦濁濁則脈形重濁至數混亂吾診乎此但知其主貧與賤而已若曰某時招晦某時失財某時損妻某時克子吾亦莫得而知矣又有形濁而脈清者此謂濁中之清所主得意處多而失意處少也質清而脈濁者此謂清中之濁所主失志處多而得志處少也又有形不甚清脈不甚濁但浮沉各得其位大小不失其等亦主平穩而無大得喪也富貴而壽脈清而長貧賤而夭脈濁而促其或清而促者富貴而夭也濁而長者貧賤而壽也其他言有所未盡義有所未備學者可以准此而類推是則吾之所調以脈而知人富貴窮通者一本於理而論也豈敢妄為之說以欺人哉噫予所以著為是論者蓋以世之有言太素脈者靡不翕然稱美不惟不能以理折又從而延譽之於人縱使其言有謬陰又與之委曲而影射此所謂誤己而誤人者也果何益之有哉又有迎醫服藥者不惟不先言其所苦甚至再三詢叩終於默默至有隱疾而困醫者醫固為爾所困不思身亦為醫所困矣籲可慨也夫此皆世之通患人所共有故予不得不詳論之以致夫叮嚀之意俾聾瞽者或有所開發焉孟子曰予豈好辯哉予不得已也經曰春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽冬傷於寒春必病溫王安道注曰四氣之傷人人豈能於未發病之前預知其客於何經絡何臟腑而成何病乎及其既發病然後可以診候始知其客於某經絡某臟腑成某病耳飧泄也痎瘧也咳嗽也溫病也皆是因其病發之時形診昭著乃逆推之而知其昔日致病之原為傷風傷暑傷濕傷寒耳非是初受傷之時能預定其必為此病也機按四氣所傷入於皮膚之內藏於經脈之中宜其見於動脈可以診候而知也而王氏所論尚謂病若未發難以診候而知彼富貴貧賤天之命也身外事也非若邪氣入於皮膚藏於血脈也烏可以脈而知之乎王氏此論足以破太素之謬矣故並附之以示來者論澀脈弦脈出丹溪脈之狀不一大率多兼見人之病有四曰寒曰熱曰虛曰實故學診者亦必以浮沉遲數為之綱以察病情初學者又以浮數為熱為有餘沉遲為寒為不足其間最難體認者澀脈也最難調治者弦脈也澀脈細而遲往來難且散又曰短而止皆是不足之象得此脈者固為寒為濕為血少為氣多為汙血然亦有病熱與實者不可不知或因多怒或因憂鬱或因厚味或因補劑或因無汗氣騰血沸清化為濁老痰宿飲膠固雜揉脈道阻澀亦見澀狀若重取至骨來似有力且帶數以意參之於證驗之形氣但有熱證當作實熱可也醫於指下見有不足之象便以為虛為寒用藥熱補誤人多矣弦為春令之脈非春時而見木為病也五臟更相制伏以防其太過木為病則肝邪盛矣肝之盛金之衰也金之衰火之炎也火之炎水之弱也金不足以制木則土病矣考之諸家皆曰弦者虛也為反胃為痛沉弦為懸飲弦長為積病弦緊而細主癥弦而伏主癥不治弦急為腹痛弦而鉤主蜚屍弦小主寒痹弦而大主半產漏下亡血失精雙弦為寒雙弦而遲為心下堅偏弦為飲左寸弦頭痛右寸弦水走腸胃左關弦怒而血聚右關弦寒痛四肢拘急趺陽弦腸痔下血尺中弦小腹痛迴腸結核率是木邪風氣土極士敗為病先哲常言之矣惟金因火伏木寡於畏之論尚未發明倘非滋水以降火厚土以養金加以行濕散風導郁為之輔佐邪何由去病何由安況弦脈為病甚多而治法又有隔二隔三之遠故不容不辨若曰不然夫弦屬陽而仲景列於五陰之數至於敘六殘賊之脈又以弦為之首澀為之終其意可見又云癰疽而得浮洪弦數氣病脈也豈可據此作熱論沉細弱澀血病脈也豈可據此作寒論此萬病之根本非特癰疽而已機按丹溪論澀弦二脈及癰疽之脈主病與諸家所主大不相侔夫脈藏於血脈之中形之於脈宜其同也何脈同而病異耶此脈所以難憑務須觀形而審證也噫脈本以察病而病尚難以脈決彼富貴貧賤乃外來假設之事非藏於血脈中也所謂趙孟所貴趙孟能賤豈得形之於脈而可以脈之乎脈大必病進論出丹溪脈血之所為屬陰大洪之別名火之象屬陽其病得之於內傷者陰虛為陽所乘故脈大當作虛多治之其病得之於外傷者邪客於經脈亦大當作邪勝治之合二者而觀之皆病症方長之勢也謂之病進不亦宜乎機按脈之大一也內傷得之為虛多外傷得之為邪勝便要審證如此分別不知太素家診得此脈亦將審其貴賤而如此分別否乎脈說出東坡脈之難也尚矣至虛有實候大實有羸狀差之毫釐疑似之間便有死生禍福之異可不慎歟病不可不謁醫醫之明脈者天下蓋一二數亦因其長而護其短耳士大夫多秘所患求診以驗醫之能否使索病於冥漠之中辨虛實冷熱於疑似之間醫不幸而失終不肯自謂失也則巧飾遂非以全其名至於不救則曰是固難治也間有謹願者雖或因主人之言復參以己之所見兩存而雜治以故藥之不效此世之通患而莫之悟也吾平生求醫蓋於平時默驗其工拙至於有疾而求療必先盡告以所患使醫瞭然知患之所在虛實冷熱已定於中矣然後求診則脈之疑似不能惑也故雖中醫治吾病常愈吾求疾愈而已豈以困醫為事哉機按東坡有宋名人尚不使醫索病於脈者蓋以脈虛而病實者脈實而病虛者脈有不相應故也籲病且難憑於脈而欲憑脈知富貴貧賤寧不為東坡笑耶
